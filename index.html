<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智慧學習平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        :root { --brand-green: #006D41; --brand-gold: #D4AF37; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f7f9f8; color: #1a1a1a; margin: 0; -webkit-tap-highlight-color: transparent; text-align: left; }
        .bg-brand-green { background-color: var(--brand-green); }
        .text-brand-green { color: var(--brand-green); }
        .bg-brand-gold { background-color: var(--brand-gold); }
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .card-active:active { transform: scale(0.96); background-color: #f0fdf4; }
        .shadow-premium { box-shadow: 0 10px 25px -5px rgba(0, 109, 65, 0.1); }
        input, textarea { border-radius: 0.75rem; -webkit-appearance: none; }
        .modal-overlay { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="min-h-screen pb-24">

    <script>
        // 🚀 行長專屬：連線地址已鎖定為您的新網域
        // 如果您在 Cloudflare 設定的是子網域，請將其改為 https://study.deepmystic.net/api
        const API_BASE = "https://deepmystic.net/api"; 

        window.allExams = []; 
        window.tempEditData = []; 
        window.quizData = [];
        window.currentCategory = "專業"; 
        window.currentIdx = 0; 
        window.score = 0;
        window.isAdminView = false; 
        window.pendingAction = null; 
        window.selectedCount = 0;
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>

    <nav class="bg-white shadow-sm px-5 py-4 flex justify-between items-center sticky top-0 z-50 border-b-2 border-[#D4AF37]">
        <div>
            <h1 class="font-bold text-gray-800 text-xl tracking-tight">同仁，你好！</h1>
            <p class="text-[9px] text-gray-400 uppercase tracking-[0.25em] font-bold">China Direct Access Enabled</p>
        </div>
        <button id="adminToggle" class="text-[10px] px-5 py-2.5 rounded-xl font-bold bg-gray-100 text-gray-500 card-active">管理員登入</button>
    </nav>

    <div class="max-w-md mx-auto p-5 text-center">
        <!-- [1] 學員模式首頁 -->
        <div id="learnerSection" class="slide-in">
            <div id="learnerHome" class="space-y-12 pt-6">
                <h2 class="text-2xl font-bold text-gray-800">精進地圖</h2>
                <div class="grid grid-cols-1 gap-6">
                    <div onclick="window.onSelectCategory('專業')" class="card-active bg-white p-12 rounded-[2.5rem] border-b-8 border-[#006D41] shadow-premium flex flex-col items-center group transition-all">
                        <div class="text-6xl mb-4 group-active:scale-110">🎓</div>
                        <h3 class="font-bold text-xl text-gray-700">專業知識</h3>
                        <p class="text-[10px] text-gray-400 mt-2 uppercase tracking-widest font-bold">Professional Skills</p>
                    </div>
                    <div onclick="window.onSelectCategory('日常')" class="card-active bg-white p-12 rounded-[2.5rem] border-b-8 border-blue-600 shadow-premium flex flex-col items-center group transition-all">
                        <div class="text-6xl mb-4 group-active:scale-110">📋</div>
                        <h3 class="font-bold text-xl text-gray-700">日常規範</h3>
                        <p class="text-[10px] text-gray-400 mt-2 uppercase tracking-widest font-bold">Daily Standards</p>
                    </div>
                </div>
                <div class="pt-8">
                    <p class="text-[9px] text-gray-300 font-bold uppercase tracking-widest leading-loose">Protected by DeepMystic Network<br>© 2024 All Rights Reserved</p>
                </div>
            </div>

            <!-- 單元清單 -->
            <div id="unitSelectView" class="hidden space-y-6">
                <button onclick="window.backToCategories()" class="text-xs text-gray-400 font-bold py-2 mx-auto flex items-center">← 返回地圖</button>
                <div id="unitList" class="space-y-4"></div>
            </div>

            <!-- 測驗區域 -->
            <div id="learnerQuiz" class="hidden">
                <div class="bg-white rounded-3xl shadow-sm p-5 mb-6 flex items-center justify-between border border-gray-50">
                    <span id="prog-text" class="text-[10px] font-bold text-gray-400 font-mono">01 / 00</span>
                    <div class="flex-1 mx-5 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                        <div id="prog-bar" class="bg-brand-gold h-full transition-all duration-700" style="width: 0%"></div>
                    </div>
                    <span id="unit-badge" class="text-[9px] bg-brand-green text-white px-3 py-1 rounded-full font-bold truncate">UNIT</span>
                </div>
                <div id="quiz-container"></div>
                <div id="result-screen" class="hidden bg-white rounded-[3rem] shadow-2xl p-12 text-center slide-in border border-gray-50">
                    <div id="result-icon" class="text-7xl mb-8">🏆</div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">精進成功</h2>
                    <p id="result-score-text" class="font-bold text-brand-green text-lg mb-4"></p>
                    <p id="result-msg" class="text-gray-500 text-sm mb-10 leading-relaxed"></p>
                    <button onclick="window.backToUnits()" class="w-full bg-brand-green text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95">返回列表</button>
                </div>
            </div>
        </div>

        <!-- [2] 管理端介面 -->
        <div id="adminSection" class="hidden slide-in">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-premium border border-gray-50 mb-8 text-left">
                <h3 class="text-[11px] font-bold text-gray-400 uppercase mb-6 tracking-widest italic">Manager Console</h3>
                <div class="flex gap-2 mb-8">
                    <button onclick="window.switchAdminCat('專業')" class="admin-cat-btn flex-1 py-3 rounded-xl text-xs font-bold bg-brand-green text-white shadow-lg">專業</button>
                    <button onclick="window.switchAdminCat('日常')" class="admin-cat-btn flex-1 py-3 rounded-xl text-xs font-bold bg-gray-50 text-gray-400">日常</button>
                </div>
                <div class="space-y-6">
                    <input type="text" id="unitTitleInput" class="w-full p-4 border border-gray-100 rounded-2xl text-sm font-bold bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-green" placeholder="設定名稱">
                    <div id="dropZone" class="border-2 border-dashed border-gray-200 rounded-[1.5rem] p-6 text-center cursor-pointer hover:bg-green-50 transition-all mb-3 group">
                        <div class="text-3xl mb-1 group-active:scale-110">📂</div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">點擊導入素材</p>
                        <input type="file" id="fileInput" class="hidden" accept=".pdf,.docx,.jpg,.jpeg,.png" multiple>
                    </div>
                    <textarea id="rawText" class="w-full h-32 p-4 bg-gray-50 border border-gray-100 rounded-2xl text-xs focus:outline-none shadow-inner" placeholder="解析內容在此..."></textarea>
                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <button id="preAiGenBtn" class="bg-brand-green text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 text-xs">✨ AI 智能出題</button>
                        <button id="preManualBtn" class="bg-white border border-gray-200 text-gray-600 font-bold py-4 rounded-2xl shadow-sm active:scale-95 text-xs">✍️ 手動專家出題</button>
                    </div>
                    <button id="publishBtn" class="w-full bg-brand-gold text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-sm mt-2">🚀 正式發布至雲端數據庫</button>
                </div>
            </div>
            <div id="aiLoader" class="hidden py-10 text-center"><div class="flex justify-center gap-2 mb-3"><div class="w-2.5 h-2.5 bg-brand-green rounded-full loading-dot"></div><div class="w-2.5 h-2.5 bg-brand-green rounded-full loading-dot" style="animation-delay: 0.2s"></div><div class="w-2.5 h-2.5 bg-brand-green rounded-full loading-dot" style="animation-delay: 0.4s"></div></div><p class="text-[11px] text-gray-400 font-bold tracking-widest uppercase">AI Logic Processing...</p></div>
            <div id="editArea" class="space-y-6 pb-28"></div>
        </div>
    </div>

    <!-- 題數選擇彈窗 -->
    <div id="countModal" class="hidden fixed inset-0 z-[200] modal-overlay flex items-center justify-center p-6 text-center">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] shadow-2xl p-8 slide-in border border-gray-50">
            <h3 class="text-lg font-bold text-gray-800 text-center mb-6">請選擇新增題數</h3>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="window.selectCount(5, this)" class="count-btn py-4 bg-gray-50 border border-gray-100 rounded-2xl font-bold text-gray-500 transition-all">5 題</button>
                <button onclick="window.selectCount(10, this)" class="count-btn py-4 bg-gray-50 border border-gray-100 rounded-2xl font-bold text-gray-500 transition-all">10 題</button>
                <button onclick="window.selectCount(15, this)" class="count-btn py-4 bg-gray-50 border border-gray-100 rounded-2xl font-bold text-gray-500 transition-all">15 題</button>
                <button onclick="window.selectCount(20, this)" class="count-btn py-4 bg-gray-50 border border-gray-100 rounded-2xl font-bold text-gray-500 transition-all">20 題</button>
            </div>
            <div id="startActionContainer" class="hidden slide-in">
                <button id="executeBtn" onclick="window.executeAction()" class="w-full bg-brand-green text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-sm mb-4">🚀 開始出題</button>
            </div>
            <button onclick="window.closeModal()" class="w-full text-xs text-gray-400 font-bold uppercase tracking-widest py-1">取消</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-2xl text-[10px] font-bold shadow-2xl opacity-0 transition-all pointer-events-none z-[100] border border-gray-700 whitespace-nowrap text-center max-w-[85vw]"></div>

    <script type="module">
        window.showToast = (msg) => { const t = document.getElementById('toast'); if(!t) return; t.innerText = msg; t.classList.remove('opacity-0'); setTimeout(() => t.classList.add('opacity-0'), 6000); };
        
        async function apiRequest(path, options = {}) {
            try {
                const res = await fetch(API_BASE + path, options);
                if (!res.ok) throw new Error(`Code ${res.status}`);
                return await res.json();
            } catch (e) { window.showToast("❌ 雲端連線失敗：" + e.message); return null; }
        }

        window.onSelectCategory = async (cat) => {
            window.currentCategory = cat;
            document.getElementById('learnerHome').classList.add('hidden');
            document.getElementById('unitSelectView').classList.remove('hidden');
            window.showToast(`🔍 正在從 ${window.location.hostname} 同步資料...`);
            const data = await apiRequest(`/getExams?t=${Date.now()}`);
            if (data) { window.allExams = data; window.renderUnitList(); }
        };

        window.renderUnitList = () => {
            const list = document.getElementById('unitList');
            if(!list) return;
            const filtered = (window.allExams || []).filter(e => e.category && (e.category.includes(window.currentCategory) || window.currentCategory.includes(e.category)));
            if (filtered.length === 0) { list.innerHTML = `<div class="py-24 text-center text-gray-300 italic text-xs px-10 leading-loose">雲端目前暫無更新</div>`; return; }
            list.innerHTML = filtered.map(u => `<div onclick="window.startExam('${u.id}')" class="bg-white p-6 rounded-[2rem] shadow-premium border border-white flex justify-between items-center card-active text-left"><div><h4 class="font-bold text-gray-700 text-base mb-1 tracking-tight">${u.title}</h4><span class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">${u.questions.length} 題精進練習</span></div><div class="text-brand-green text-xl font-bold">▶</div></div>`).join('');
        };

        window.startExam = (id) => {
            const ex = window.allExams.find(e => e.id === id); if(!ex) return;
            window.quizData = ex.questions; window.currentIdx = 0; window.score = 0;
            document.getElementById('unitSelectView').classList.add('hidden');
            document.getElementById('learnerQuiz').classList.remove('hidden');
            if(document.getElementById('unit-badge')) document.getElementById('unit-badge').innerText = ex.title;
            window.renderQuestion();
        };

        window.renderQuestion = () => {
            const container = document.getElementById('quiz-container');
            const item = window.quizData[window.currentIdx]; if(!item || !container) return;
            document.getElementById('prog-text').innerText = `${(window.currentIdx + 1).toString().padStart(2, '0')} / ${window.quizData.length.toString().padStart(2, '0')}`;
            document.getElementById('prog-bar').style.width = `${((window.currentIdx + 1) / window.quizData.length) * 100}%`;
            container.innerHTML = `<div class="bg-white rounded-[2.5rem] shadow-premium p-8 mb-6 slide-in border border-white text-left"><h3 class="text-lg font-bold text-gray-800 leading-snug mb-8">${item.q}</h3><div class="space-y-4">${item.o.map((opt, i) => `<button onclick="window.handleSelect(${i})" class="quiz-btn w-full text-left p-5 rounded-2xl border-2 border-gray-50 text-xs font-medium text-gray-600 bg-gray-50 card-active transition-all flex justify-between items-center group"><span>${opt}</span><span id="fb-${i}" class="font-bold text-lg opacity-0"></span></button>`).join('')}</div><div id="expl-box" class="hidden mt-8 p-6 bg-[#fdfaf2] rounded-3xl border-l-4 border-brand-green shadow-inner"><p class="text-[11px] text-emerald-900 leading-relaxed"><span class="font-bold block mb-2 text-emerald-900 underline decoration-brand-gold underline-offset-4 decoration-2">💡 指導解析</span>${item.i}</p><button onclick="window.nextQuest()" class="mt-6 w-full bg-brand-green text-white py-4 rounded-xl font-bold text-xs shadow-md active:scale-95 transition-transform">下一題</button></div></div>`;
        };

        window.handleSelect = (idx) => {
            const correct = window.quizData[window.currentIdx].a; const btns = document.querySelectorAll('.quiz-btn');
            btns.forEach(b => b.disabled = true);
            const fb = document.getElementById(`fb-${idx}`); const fbc = document.getElementById(`fb-${correct}`);
            if (idx == correct) { 
                window.score++; btns[idx].classList.add('bg-green-100', 'border-emerald-300', 'text-green-700'); 
                if(fb){fb.innerText="⭕"; fb.classList.remove('opacity-0');}
            } else { 
                btns[idx].classList.add('bg-red-50', 'border-red-500', 'text-red-700'); 
                if(fb){fb.innerText="❌"; fb.classList.remove('opacity-0');}
                btns[correct].classList.add('bg-green-100', 'border-emerald-300', 'text-green-700'); 
                if(fbc){fbc.innerText="⭕"; fbc.classList.remove('opacity-0');}
            }
            document.getElementById('expl-box').classList.remove('hidden');
        };

        window.nextQuest = () => { window.currentIdx++; if (window.currentIdx < window.quizData.length) window.renderQuestion(); else window.showFinalResult(); };

        window.showFinalResult = () => {
            document.getElementById('quiz-container').classList.add('hidden');
            const screen = document.getElementById('result-screen');
            screen.classList.remove('hidden');
            const total = window.quizData.length; const rate = window.score / total;
            document.getElementById('result-score-text').innerText = `得分結算：${window.score} / ${total}`;
            const msg = document.getElementById('result-msg'); const icon = document.getElementById('result-icon');
            if (rate < 0.5) { icon.innerText = "💪"; msg.innerText = "別灰心！這份內容挑戰性較高。建議仔細複習指導解析，持續精進，下一次練習一定會更出色！"; }
            else { icon.innerText = "🏆"; msg.innerText = "表現優異！您已成功掌握本單元核心知識。卓越不凡，成就專業！"; }
        };

        // --- 管理邏輯 ---
        window.closeModal = () => { document.getElementById('countModal').classList.add('hidden'); document.getElementById('startActionContainer').classList.add('hidden'); window.selectedCount = 0; };
        window.selectCount = (count, btn) => { window.selectedCount = count; document.querySelectorAll('.count-btn').forEach(b => b.style.borderColor = "#f3f4f6"); btn.style.borderColor = "#006D41"; document.getElementById('startActionContainer').classList.remove('hidden'); };
        window.executeAction = async () => { const count = window.selectedCount; const action = window.pendingAction; window.closeModal(); if (action === 'ai') await window.executeAiGen(count); else if (action === 'manual') window.executeManualAdd(count); };
        window.backToCategories = () => { document.getElementById('unitSelectView').classList.add('hidden'); document.getElementById('learnerHome').classList.remove('hidden'); };
        window.backToUnits = () => { document.getElementById('learnerQuiz').classList.add('hidden'); document.getElementById('unitSelectView').classList.remove('hidden'); window.renderUnitList(); };

        window.renderEditCards = () => {
            const area = document.getElementById('editArea'); if (!area) return;
            if (window.tempEditData.length === 0) { area.innerHTML = ""; return; }
            area.innerHTML = window.tempEditData.map((d, i) => `
                <div class="bg-white p-6 rounded-[2.5rem] border border-gray-100 slide-in mb-5 relative text-left shadow-sm">
                    <button onclick="window.tempEditData.splice(${i},1); window.renderEditCards();" class="absolute top-7 right-7 p-2 bg-red-50 text-red-500 rounded-full transition-all card-active"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
                    <div class="flex items-center gap-3 mb-5 pr-10"><span class="bg-brand-green text-white w-6 h-6 rounded-full text-[9px] flex items-center justify-center font-bold font-mono shrink-0">#${i+1}</span><input type="text" value="${d.q}" oninput="window.tempEditData[${i}].q=this.value" class="flex-1 font-bold bg-transparent border-b border-gray-100 py-1 text-sm text-gray-800 focus:outline-none"></div>
                    <div class="grid grid-cols-1 gap-2">${d.o.map((o, oi) => `<div class="flex items-center gap-2 bg-gray-50 p-3 rounded-xl border border-gray-100"><input type="radio" name="corr_${i}" ${d.a == oi ? 'checked' : ''} onchange="window.tempEditData[${i}].a=${oi}" class="w-4 h-4 text-brand-green"><input type="text" value="${o}" oninput="window.tempEditData[${i}].o[${oi}]=this.value" class="text-[11px] w-full bg-transparent focus:outline-none"></div>`).join('')}</div>
                    <textarea oninput="window.tempEditData[${i}].i=this.value" class="w-full mt-4 bg-yellow-50 p-4 rounded-2xl text-[10px] text-yellow-900 focus:outline-none leading-relaxed shadow-inner" rows="3" placeholder="錄入解析...">${d.i}</textarea>
                </div>`).join('');
        };

        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('adminToggle');
            const fileInput = document.getElementById('fileInput');
            const dropZone = document.getElementById('dropZone');
            const publishBtn = document.getElementById('publishBtn');

            toggleBtn.onclick = () => {
                window.isAdminView = !window.isAdminView;
                const learnerSec = document.getElementById('learnerSection'); const adminSec = document.getElementById('adminSection');
                if (window.isAdminView) {
                    learnerSec.classList.add('hidden'); adminSec.classList.remove('hidden');
                    toggleBtn.innerText = "返回首頁"; toggleBtn.className = "text-[10px] px-5 py-2.5 rounded-xl font-bold bg-brand-green text-white shadow-md card-active";
                    window.switchAdminCat("專業");
                } else {
                    adminSec.classList.add('hidden'); learnerSec.classList.remove('hidden');
                    toggleBtn.innerText = "管理員登入"; toggleBtn.className = "text-[10px] px-5 py-2.5 rounded-xl font-bold bg-gray-100 text-gray-500 shadow-inner card-active";
                    window.backToCategories();
                }
            };

            document.getElementById('preAiGenBtn').onclick = () => { window.pendingAction = 'ai'; document.getElementById('countModal').classList.remove('hidden'); };
            document.getElementById('preManualBtn').onclick = () => { window.pendingAction = 'manual'; document.getElementById('countModal').classList.remove('hidden'); };

            window.executeAiGen = async (count) => {
                const text = document.getElementById('rawText')?.value; if (!text) return window.showToast("請貼入素材內容");
                document.getElementById('aiLoader')?.classList.remove('hidden');
                const existingQs = window.tempEditData.map(d => d.q).join("、");
                const prompt = `你是一位銀行專家。針對法規產出 ${count} 題單選練習。格式：[{"q":"題目","o":["A","B","C","D"],"a":0,"i":"解析"}]。內容：\n${text}。避開題目：${existingQs}`;
                const data = await apiRequest("/aiProxy", { method: 'POST', body: JSON.stringify({ prompt }) });
                if (data) { 
                    const clean = data.choices[0].message.content.replace(/```json/g, '').replace(/```/g, '').trim();
                    window.tempEditData = window.tempEditData.concat(JSON.parse(clean)); window.renderEditCards(); window.showToast(`✅ AI 已產出 ${count} 題`);
                }
                document.getElementById('aiLoader')?.classList.add('hidden');
            };

            window.executeManualAdd = (count) => { for(let i=0; i<count; i++) window.tempEditData.push({ q: "手動專家題目", o: ["選項 A", "選項 B", "選項 C", "選項 D"], a: 0, i: "在此錄入解析指導..." }); window.renderEditCards(); window.showToast(`✅ 已新增 ${count} 個模板`); };

            dropZone.onclick = () => fileInput.click();
            fileInput.onchange = async (e) => {
                const files = Array.from(e.target.files);
                for (let file of files) {
                    window.showToast(`讀取素材: ${file.name}`);
                    if (file.type === "application/pdf") {
                        const ab = await file.arrayBuffer(); const pdf = await pdfjsLib.getDocument(new Uint8Array(ab)).promise;
                        let text = ""; for (let p = 1; p <= pdf.numPages; p++) { const pg = await pdf.getPage(p); const ct = await pg.getTextContent(); text += ct.items.map(s => s.str).join(" ") + "\n"; }
                        document.getElementById('rawText').value += text + "\n";
                    } else if (file.name.endsWith(".docx")) {
                        const ab = await file.arrayBuffer(); const res = await mammoth.extractRawText({ arrayBuffer: ab });
                        document.getElementById('rawText').value += res.value + "\n";
                    } else { window.showToast("✅ 素材導入成功"); }
                }
            };

            publishBtn.onclick = async () => {
                const title = document.getElementById('unitTitleInput')?.value; if (!title) return window.showToast("請定義名稱");
                if (window.tempEditData.length === 0) return window.showToast("目前無內容可發布");
                publishBtn.disabled = true; publishBtn.innerText = "同步中...";
                const res = await apiRequest("/saveExam", { method: 'POST', body: JSON.stringify({ category: window.currentCategory, title, questions: window.tempEditData }) });
                if (res) { window.showToast("✅ 已同步至雲端金庫！"); window.tempEditData = []; if(document.getElementById('unitTitleInput')) document.getElementById('unitTitleInput').value = ""; window.renderEditCards(); }
                publishBtn.disabled = false; publishBtn.innerText = "🚀 正式發布至雲端";
            };
        });
    </script>
</body>
</html>
