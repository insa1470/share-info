<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>企業智慧學習平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        :root { --esun-green: #006D41; --esun-gold: #D4AF37; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8faf9; color: #1a1a1a; margin: 0; }
        .esun-bg-green { background-color: var(--esun-green); }
        .esun-text-green { color: var(--esun-green); }
        .slide-in { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .loading-dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .btn-active:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <script>
        const CLOUDFLARE_WORKER_API = "https://bank-study-api.insa-eco.workers.dev"; 
        window.allExams = []; 
        window.tempEditData = [];
        window.currentCategory = "TMU";
    </script>

    <!-- 頂部導航 -->
    <nav class="bg-white shadow-sm px-4 py-3 flex justify-between items-center sticky top-0 z-50 border-b-2 border-[#D4AF37]">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 esun-bg-green rounded-lg flex items-center justify-center text-white font-bold text-xs">智庫</div>
            <h1 class="font-bold text-gray-800 text-sm">智慧學習平台</h1>
        </div>
        <div class="flex bg-gray-100 p-1 rounded-lg">
            <button id="viewLearner" class="text-[10px] px-4 py-1.5 rounded-md font-bold transition-all bg-white esun-text-green shadow-sm btn-active">學員端</button>
            <button id="viewAdmin" class="text-[10px] px-4 py-1.5 rounded-md font-bold transition-all text-gray-400 ml-1 btn-active">管理端</button>
        </div>
    </nav>

    <!-- 學員模式 -->
    <div id="learnerSection" class="max-w-md mx-auto p-4 py-6 slide-in">
        <div id="learnerHome" class="space-y-8">
            <div class="text-center">
                <h2 class="text-2xl font-bold text-gray-800 mb-1">知識地圖</h2>
                <div class="w-10 h-1 bg-[#D4AF37] mx-auto rounded-full mb-2"></div>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">China Direct Connection</p>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div onclick="window.onSelectCategory('TMU')" class="bg-white p-6 rounded-[2rem] border-b-4 border-emerald-600 shadow-sm btn-active text-center">
                    <div class="text-3xl mb-2">📈</div><h3 class="font-bold text-xs text-gray-700">TMU</h3>
                </div>
                <div onclick="window.onSelectCategory('存匯')" class="bg-white p-6 rounded-[2rem] border-b-4 border-blue-600 shadow-sm btn-active text-center">
                    <div class="text-3xl mb-2">💰</div><h3 class="font-bold text-xs text-gray-700">存匯</h3>
                </div>
                <div onclick="window.onSelectCategory('授信')" class="bg-white p-6 rounded-[2rem] border-b-4 border-orange-500 shadow-sm btn-active text-center">
                    <div class="text-3xl mb-2">📜</div><h3 class="font-bold text-xs text-gray-700">授信</h3>
                </div>
                <div onclick="window.onSelectCategory('零售')" class="bg-white p-6 rounded-[2rem] border-b-4 border-purple-500 shadow-sm btn-active text-center">
                    <div class="text-3xl mb-2">🛍️</div><h3 class="font-bold text-xs text-gray-700">零售</h3>
                </div>
            </div>
            
            <div class="text-center pt-8">
                <button onclick="window.location.reload(true)" class="text-[9px] text-gray-300 underline underline-offset-4">強制同步最新雲端資料</button>
            </div>
        </div>

        <!-- 單元清單 -->
        <div id="unitSelectView" class="hidden space-y-4">
            <button onclick="window.backToCategories()" class="text-xs text-gray-400 font-bold mb-2">← 返回分類</button>
            <div id="unitList" class="space-y-3"></div>
        </div>

        <!-- 測驗區域 -->
        <div id="learnerQuiz" class="hidden">
            <div id="quiz-container"></div>
            <div id="result-screen" class="hidden bg-white rounded-[2.5rem] shadow-xl p-10 text-center slide-in">
                <div class="text-6xl mb-6">🏆</div>
                <h2 class="text-xl font-bold mb-2">學習已達標</h2>
                <p id="result-msg" class="text-xs text-gray-500 mb-8"></p>
                <button onclick="window.backToUnits()" class="w-full esun-bg-green text-white font-bold py-4 rounded-2xl shadow-lg btn-active">回單元清單</button>
            </div>
        </div>
    </div>

    <!-- 管理端 -->
    <div id="adminSection" class="hidden p-4 max-w-md mx-auto slide-in">
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 mb-6">
            <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-4 tracking-widest italic">Management Center</h3>
            <div class="flex flex-wrap gap-2 mb-6">
                <button onclick="window.switchAdminCat('TMU')" class="admin-cat-btn px-4 py-1.5 rounded-full text-[10px] font-bold esun-bg-green text-white">TMU</button>
                <button onclick="window.switchAdminCat('存匯')" class="admin-cat-btn px-4 py-1.5 rounded-full text-[10px] font-bold bg-gray-50 text-gray-400">存匯</button>
                <button onclick="window.switchAdminCat('授信')" class="admin-cat-btn px-4 py-1.5 rounded-full text-[10px] font-bold bg-gray-50 text-gray-400">授信</button>
                <button onclick="window.switchAdminCat('零售')" class="admin-cat-btn px-4 py-1.5 rounded-full text-[10px] font-bold bg-gray-50 text-gray-400">零售</button>
            </div>
            <input type="text" id="unitTitleInput" class="w-full p-3 mb-4 border border-gray-100 rounded-xl text-sm font-bold bg-gray-50 focus:outline-none" placeholder="輸入卷宗名稱">
            <textarea id="rawText" class="w-full h-24 p-3 bg-gray-50 border border-gray-100 rounded-xl text-xs mb-4 focus:outline-none" placeholder="貼入法規文字..."></textarea>
            <button id="aiGenBtn" class="w-full esun-bg-green text-white font-bold py-4 rounded-2xl shadow-md btn-active mb-3">✨ 啟動 AI 智能出題</button>
            <button id="publishBtn" class="w-full bg-[#D4AF37] text-white font-bold py-4 rounded-2xl shadow-md btn-active">🚀 發布至雲端金庫</button>
        </div>
        <div id="aiLoader" class="hidden py-10 text-center"><div class="flex justify-center gap-2 mb-2"><div class="w-2 h-2 esun-bg-green rounded-full loading-dot"></div><div class="w-2 h-2 esun-bg-green rounded-full loading-dot" style="animation-delay: 0.2s"></div><div class="w-2 h-2 esun-bg-green rounded-full loading-dot" style="animation-delay: 0.4s"></div></div><p class="text-[10px] text-gray-400">AI 分析中...</p></div>
        <div id="editArea" class="space-y-4 pb-24"></div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-[10px] font-bold shadow-2xl opacity-0 transition-all pointer-events-none z-[100] whitespace-nowrap"></div>

    <script type="module">
        const getUrl = (p) => CLOUDFLARE_WORKER_API.replace(/\/$/, "") + p;

        // 🌟 核心數據抓取
        async function fetchCloud() {
            try {
                // 加入亂數參數防止手機瀏覽器抓取快取
                const res = await fetch(getUrl(`/getExams?t=${Date.now()}`), { cache: 'no-store' });
                if(!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || "伺服器回應錯誤");
                }
                const data = await res.json();
                console.log("Fetched Data:", data);
                return data;
            } catch (e) {
                window.showToast("❌ 連線異常: " + e.message);
                return [];
            }
        }

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg; t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 5000);
        };

        window.onSelectCategory = async (cat) => {
            window.currentCategory = cat;
            document.getElementById('learnerHome').classList.add('hidden');
            document.getElementById('unitSelectView').classList.remove('hidden');
            window.showToast(`🔍 正在同步 ${cat} 雲端數據...`);
            window.allExams = await fetchCloud();
            window.renderUnitList();
        };

        window.renderUnitList = () => {
            const list = document.getElementById('unitList');
            const filtered = (window.allExams || []).filter(e => e.category === window.currentCategory);
            if (filtered.length === 0) { 
                list.innerHTML = `<div class="py-20 text-center text-gray-300 italic text-xs">此分組目前尚無發布考卷。<br><br>請確認管理端是否已「發布至雲端」</div>`; 
                return; 
            }
            list.innerHTML = filtered.map(u => `
                <div onclick="window.startExam('${u.id}')" class="bg-white p-5 rounded-[1.5rem] shadow-sm border border-gray-50 flex justify-between items-center btn-active">
                    <div><h4 class="font-bold text-gray-700 text-sm">${u.title}</h4><span class="text-[9px] text-gray-400">${u.questions.length} 題案例練習</span></div>
                    <div class="text-emerald-500 text-lg">▶</div>
                </div>`).join('');
        };

        window.startExam = (id) => {
            const ex = window.allExams.find(e => e.id === id);
            if(!ex) return;
            window.quizData = ex.questions; window.currentIdx = 0; window.score = 0;
            document.getElementById('unitSelectView').classList.add('hidden');
            document.getElementById('learnerQuiz').classList.remove('hidden');
            window.renderQuestion();
        };

        window.backToCategories = () => { document.getElementById('unitSelectView').classList.add('hidden'); document.getElementById('learnerHome').classList.remove('hidden'); };
        window.backToUnits = () => { document.getElementById('learnerQuiz').classList.add('hidden'); document.getElementById('unitSelectView').classList.remove('hidden'); window.renderUnitList(); };

        window.renderQuestion = () => {
            const container = document.getElementById('quiz-container');
            const item = window.quizData[window.currentIdx]; if(!item) return;
            container.innerHTML = `
                <div class="bg-white rounded-[2rem] shadow-sm p-6 mb-4 slide-in border border-gray-50 text-left">
                    <span class="text-[9px] font-bold text-gray-300 uppercase tracking-widest font-mono">Question ${window.currentIdx + 1}</span>
                    <h3 class="text-lg font-bold text-gray-800 leading-snug mt-1 mb-6">${item.q}</h3>
                    <div class="space-y-3">
                        ${item.o.map((opt, i) => `<button onclick="window.handleSelect(${i})" class="quiz-btn w-full text-left p-4 rounded-2xl border border-gray-100 text-xs font-medium text-gray-600 bg-gray-50 btn-active">${opt}</button>`).join('')}
                    </div>
                    <div id="expl-box" class="hidden mt-6 p-5 bg-emerald-50 rounded-2xl border-l-4 border-emerald-500 shadow-inner">
                        <p class="text-[11px] text-emerald-800 leading-relaxed"><span class="font-bold block mb-1">💡 專家解析：</span>${item.i}</p>
                        <button onclick="window.nextQuest()" class="mt-5 w-full esun-bg-green text-white py-3 rounded-xl font-bold text-xs shadow-md">下一題</button>
                    </div>
                </div>`;
        };

        window.handleSelect = (idx) => {
            const correct = window.quizData[window.currentIdx].a;
            const btns = document.querySelectorAll('.quiz-btn');
            btns.forEach(b => b.disabled = true);
            if(idx == correct) { window.score++; btns[idx].classList.add('bg-green-100', 'text-green-700', 'border-green-300'); }
            else { btns[idx].classList.add('bg-red-50', 'text-red-700', 'border-red-200'); btns[correct].classList.add('bg-green-50', 'text-green-700'); }
            document.getElementById('expl-box').classList.remove('hidden');
        };

        window.nextQuest = () => {
            window.currentIdx++;
            if(window.currentIdx < window.quizData.length) window.renderQuestion();
            else { document.getElementById('quiz-container').classList.add('hidden'); document.getElementById('result-screen').classList.remove('hidden'); document.getElementById('result-msg').innerText = `本次答對 ${window.score} 題。卓越不凡！`; }
        };

        // --- 管理端 ---
        document.addEventListener('DOMContentLoaded', () => {
            const lBtn = document.getElementById('viewLearner'); 
            const aBtn = document.getElementById('viewAdmin');
            const aiGenBtn = document.getElementById('aiGenBtn');
            const publishBtn = document.getElementById('publishBtn');

            lBtn.onclick = () => { 
                document.getElementById('learnerSection').classList.remove('hidden'); 
                document.getElementById('adminSection').classList.add('hidden'); 
                lBtn.className = "text-[10px] px-4 py-1.5 rounded-md font-bold transition-all bg-white esun-text-green shadow-sm"; 
                aBtn.className = "text-[10px] px-4 py-1.5 rounded-md font-bold transition-all text-gray-400"; 
                window.backToCategories(); 
            };
            aBtn.onclick = () => { 
                document.getElementById('learnerSection').classList.add('hidden'); 
                document.getElementById('adminSection').classList.remove('hidden'); 
                aBtn.className = "text-[10px] px-4 py-1.5 rounded-md font-bold transition-all bg-white esun-text-green shadow-sm"; 
                lBtn.className = "text-[10px] px-4 py-1.5 rounded-md font-bold transition-all text-gray-400"; 
                window.switchAdminCat(window.currentCategory);
            };

            aiGenBtn.onclick = async () => {
                const text = document.getElementById('rawText').value; if(!text) return window.showToast("請貼入素材");
                const loader = document.getElementById('aiLoader'); loader.classList.remove('hidden');
                try {
                    const prompt = `你是一位銀行專家。請產出5題單選練習。格式：[{"q":"題目","o":["A","B","C","D"],"a":0,"i":"解析"}]。內容：\n${text}`;
                    const res = await fetch(getUrl("/aiProxy"), { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({prompt}) });
                    const result = await res.json();
                    const cleanJson = result.choices[0].message.content.replace(/```json/g, '').replace(/```/g, '').trim();
                    window.tempEditData = window.tempEditData.concat(JSON.parse(cleanJson));
                    renderEdit(); window.showToast("✅ AI 提取考題成功");
                } catch(e) { window.showToast("❌ AI 解析失敗"); }
                loader.classList.add('hidden');
            };

            publishBtn.onclick = async () => {
                const title = document.getElementById('unitTitleInput').value; if(!title) return window.showToast("請輸入考卷名稱");
                if(window.tempEditData.length === 0) return window.showToast("請先生成題目");
                publishBtn.disabled = true;
                try {
                    const res = await fetch(getUrl("/saveExam"), { 
                        method: 'POST', 
                        headers: {'Content-Type':'application/json'}, 
                        body: JSON.stringify({ category: window.currentCategory, title, questions: window.tempEditData }) 
                    });
                    if(res.ok) { window.showToast("✅ 已成功鎖入雲端保險箱！"); window.tempEditData = []; document.getElementById('unitTitleInput').value = ""; renderEdit(); }
                    else throw new Error("同步失敗");
                } catch(e) { window.showToast("❌ 雲端同步失敗: " + e.message); }
                publishBtn.disabled = false;
            };

            function renderEdit() {
                const area = document.getElementById('editArea');
                if(window.tempEditData.length === 0) { area.innerHTML = ""; return; }
                area.innerHTML = window.tempEditData.map((d, i) => `
                    <div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm text-left">
                        <div class="flex justify-between mb-4"><span class="text-[9px] font-bold text-gray-300">EDITING #${i+1}</span><button onclick="window.tempEditData.splice(${i}, 1); document.dispatchEvent(new Event('re-edit'));" class="text-xs">🗑️</button></div>
                        <input type="text" value="${d.q}" oninput="window.tempEditData[${i}].q=this.value" class="w-full font-bold text-xs bg-transparent border-b border-gray-50 py-2 mb-4">
                        <div class="grid grid-cols-1 gap-2">${d.o.map((o, oi) => `<div class="flex items-center gap-2"><input type="radio" name="r_${i}" ${d.a==oi?'checked':''} onchange="window.tempEditData[${i}].a=${oi}"><input type="text" value="${o}" oninput="window.tempEditData[${i}].o[${oi}]=this.value" class="text-[10px] flex-1 bg-gray-50 p-2 rounded-xl"></div>`).join('')}</div>
                    </div>`).join('');
            }
            document.addEventListener('re-edit', renderEdit);
        });
        
        window.switchAdminCat = (cat) => {
            window.currentCategory = cat;
            document.querySelectorAll('.admin-cat-btn').forEach(b => {
                b.className = b.innerText === cat ? "admin-cat-btn px-4 py-1.5 rounded-full text-[10px] font-bold esun-bg-green text-white" : "admin-cat-btn px-4 py-1.5 rounded-full text-[10px] font-bold bg-gray-50 text-gray-400";
            });
        };
    </script>
</body>
</html>
