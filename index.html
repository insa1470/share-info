<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智慧學習平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap');

        :root {
            --brand-green: #00A19B;
            --brand-gold: #007A7A;
            --sys-bg: #F2F2F7;
            --sys-bg2: #FFFFFF;
            --sys-label: #000000;
            --sys-label2: #636366;
            --sys-label3: #AEAEB2;
            --sys-separator: #C6C6C8;
            --sys-fill: rgba(120,120,128,0.12);
            --sys-radius-sm: 10px;
            --sys-radius-md: 16px;
            --sys-radius-lg: 22px;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Noto Sans TC', sans-serif;
            background-color: var(--sys-bg);
            color: var(--sys-label);
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .nav-fixed {
            position: fixed; top: 0; left: 0; width: 100%;
            z-index: 1000; height: 60px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid var(--sys-separator);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }

        .view-section { display: none !important; }
        .view-active {
            display: block !important;
            padding-top: 76px; padding-bottom: 40px;
            animation: fadeUp 0.28s cubic-bezier(0.4,0,0.2,1);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .apple-card { background: var(--sys-bg2); border-radius: var(--sys-radius-lg); overflow: hidden; }

        .ios-row {
            background: #fff; display: flex; align-items: center;
            padding: 13px 16px; border-bottom: 0.5px solid var(--sys-separator);
            cursor: pointer; transition: background 0.15s;
        }
        .ios-row:last-child { border-bottom: none; }
        .ios-row:active { background: #f0f0f0; }

        .category-card {
            background: #fff; border-radius: var(--sys-radius-lg);
            padding: 28px 24px; display: flex; align-items: center; gap: 18px;
            cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
        }
        .category-card:active { transform: scale(0.975); box-shadow: 0 1px 6px rgba(0,0,0,0.04); }

        .cat-icon-wrap {
            width: 56px; height: 56px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; flex-shrink: 0;
        }

        .btn-primary {
            background: var(--brand-green); color: #fff;
            border-radius: var(--sys-radius-md); padding: 16px;
            font-weight: 600; font-size: 17px; letter-spacing: -0.3px;
            border: none; width: 100%; cursor: pointer;
            transition: opacity 0.15s, transform 0.1s; font-family: inherit;
        }
        .btn-primary:active { opacity: 0.85; transform: scale(0.98); }

        .btn-secondary {
            background: var(--sys-fill); color: var(--sys-label);
            border-radius: var(--sys-radius-md); padding: 14px;
            font-weight: 600; font-size: 15px; border: none; width: 100%;
            cursor: pointer; transition: opacity 0.15s; font-family: inherit;
        }
        .btn-secondary:active { opacity: 0.7; }

        .btn-tinted {
            background: rgba(0,161,155,0.1); color: var(--brand-green);
            border-radius: var(--sys-radius-sm); padding: 12px 16px;
            font-weight: 600; font-size: 14px; border: none;
            cursor: pointer; transition: opacity 0.15s; font-family: inherit;
        }
        .btn-tinted:active { opacity: 0.7; }

        .ios-input {
            background: var(--sys-fill); border: none; border-radius: var(--sys-radius-sm);
            padding: 13px 16px; font-size: 17px; font-family: inherit;
            width: 100%; color: var(--sys-label); outline: none;
        }
        .ios-input::placeholder { color: var(--sys-label3); }

        .ios-textarea {
            background: var(--sys-fill); border: none; border-radius: var(--sys-radius-sm);
            padding: 13px 16px; font-size: 15px; font-family: inherit;
            width: 100%; color: var(--sys-label); outline: none; resize: none;
        }

        .ios-progress-track { background: var(--sys-fill); border-radius: 100px; height: 4px; overflow: hidden; }
        .ios-progress-fill { height: 100%; border-radius: 100px; background: var(--brand-gold); transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

        .quiz-btn {
            background: var(--sys-bg2); border: 1.5px solid var(--sys-separator);
            border-radius: var(--sys-radius-sm); padding: 14px 16px;
            text-align: left; font-size: 15px; color: var(--sys-label);
            width: 100%; cursor: pointer; transition: all 0.15s;
            display: flex; justify-content: space-between; align-items: center;
            font-family: inherit;
        }
        .quiz-btn:active:not(:disabled) { background: var(--sys-fill); }

        .modal-overlay { background: rgba(0,0,0,0.45); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
        .modal-sheet { background: rgba(242,242,247,0.98); border-radius: 24px 24px 0 0; }

        .segment-control { background: var(--sys-fill); border-radius: 10px; padding: 2px; display: flex; gap: 2px; }
        .segment-btn {
            flex: 1; padding: 7px 12px; border-radius: 8px; border: none;
            font-size: 13px; font-weight: 600; font-family: inherit;
            cursor: pointer; background: transparent; color: var(--sys-label2); transition: all 0.2s;
        }
        .segment-active { background: #fff; color: var(--sys-label); box-shadow: 0 2px 8px rgba(0,0,0,0.12); }

        .ios-badge { background: var(--brand-green); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 100px; letter-spacing: 0.2px; }

        .section-header { font-size: 13px; font-weight: 600; color: var(--sys-label2); text-transform: uppercase; letter-spacing: 0.6px; padding: 0 4px 8px; }

        .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; }

        .admin-cat-btn { flex: 1; padding: 10px; border-radius: 10px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; transition: all 0.2s; }

        .drop-zone { border: 1.5px dashed var(--sys-separator); border-radius: var(--sys-radius-md); padding: 32px 20px; text-align: center; cursor: pointer; transition: background 0.2s; }
        .drop-zone:active { background: rgba(0,161,155,0.05); }

        .ai-loader { background: rgba(0,161,155,0.06); border: 1px solid rgba(0,161,155,0.12); border-radius: var(--sys-radius-md); padding: 24px 20px; text-align: center; }

        .result-card { background: #fff; border-radius: var(--sys-radius-lg); padding: 40px 28px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        .count-btn { padding: 18px; background: var(--sys-fill); border: 1.5px solid transparent; border-radius: var(--sys-radius-sm); font-size: 17px; font-weight: 600; color: var(--sys-label2); cursor: pointer; font-family: inherit; transition: all 0.15s; }
        .count-btn-active { border-color: var(--brand-green) !important; background: rgba(0,161,155,0.08) !important; color: var(--brand-green) !important; }

        #toast { position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%); background: rgba(30,30,30,0.92); color: #fff; padding: 12px 22px; border-radius: 100px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.25); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 2000; white-space: nowrap; max-width: 85vw; text-align: center; }

        .expl-box { background: #FFFBEB; border-left: 3px solid var(--brand-gold); border-radius: 0 10px 10px 0; padding: 14px 16px; font-size: 14px; line-height: 1.6; color: #78350F; }

        .analytics-card { background: #fff; border-radius: var(--sys-radius-md); padding: 18px 16px; box-shadow: 0 1px 8px rgba(0,0,0,0.05); }

        .blindspot-tag { background: #fff; border: 1px solid #fecaca; color: #ef4444; font-size: 12px; font-weight: 600; padding: 5px 10px; border-radius: 8px; cursor: pointer; transition: opacity 0.15s; }
        .blindspot-tag:active { opacity: 0.7; }

        .page-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--sys-fill); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--brand-green); transition: background 0.15s; }
        .page-btn:active { background: rgba(0,161,155,0.15); }
        .page-btn:disabled { opacity: 0.25; pointer-events: none; }
    </style>
</head>
<body>

    <script>
        const API_BASE = window.location.origin + "/api";
        window.allExams = []; window.allRecords = []; window.tempEditData = []; window.quizData = [];
        window.currentCategory = "專業"; window.currentIdx = 0; window.score = 0;
        window.wrongIndices = []; window.currentExamId = "";
        window.isAdminView = false; window.adminTab = 'management';
        window.unitPageSize = 4; window.unitCurrentPage = 0;
        window.dashboardPageSize = 3; window.dashboardCurrentPage = 0;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>

    <!-- Navigation Bar -->
    <nav class="nav-fixed">
        <div>
            <div id="navTitle" style="font-size:17px;font-weight:600;letter-spacing:-0.4px;color:#000;">同仁，你好</div>
            <div style="display:flex;align-items:center;margin-top:1px;">
                <div id="netStatus" class="status-dot" style="background:#aeaeb2;"></div>
                <span id="netStatusText" style="font-size:11px;color:var(--sys-label3);font-weight:500;">Connecting...</span>
            </div>
        </div>
        <button id="adminToggle" onclick="window.handleAdminToggle()" style="font-size:13px;font-weight:600;padding:8px 16px;border-radius:100px;border:none;background:var(--sys-fill);color:var(--sys-label2);cursor:pointer;font-family:inherit;transition:all 0.2s;">管理員</button>
    </nav>

    <!-- [View 1] 學員首頁 -->
    <div id="learnerHome" class="view-section view-active" style="padding-left:20px;padding-right:20px;">
        <div style="margin-bottom:28px;">
            <div style="font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px;">精進學習</div>
            <div style="font-size:15px;color:var(--sys-label2);">選擇學習類別開始測驗</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:14px;">
            <div onclick="window.onSelectCategory('專業')" class="category-card">
                <div class="cat-icon-wrap" style="background:rgba(0,161,155,0.1);">🎓</div>
                <div style="flex:1;">
                    <div style="font-size:17px;font-weight:600;letter-spacing:-0.3px;">專業知識</div>
                    <div style="font-size:13px;color:var(--sys-label2);margin-top:2px;">銀行業務核心知識測驗</div>
                </div>
                <svg width="9" height="16" viewBox="0 0 9 16" fill="none"><path d="M1 1l7 7-7 7" stroke="#C6C6C8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div onclick="window.onSelectCategory('日常')" class="category-card">
                <div class="cat-icon-wrap" style="background:rgba(0,122,255,0.1);">📋</div>
                <div style="flex:1;">
                    <div style="font-size:17px;font-weight:600;letter-spacing:-0.3px;">日常規範</div>
                    <div style="font-size:13px;color:var(--sys-label2);margin-top:2px;">工作守則與合規要求</div>
                </div>
                <svg width="9" height="16" viewBox="0 0 9 16" fill="none"><path d="M1 1l7 7-7 7" stroke="#C6C6C8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
        </div>
    </div>

    <!-- [View 2] 考卷單元清單 -->
    <div id="unitSelectView" class="view-section" style="padding-left:20px;padding-right:20px;">
        <button onclick="window.switchView('learnerHome')" style="display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--brand-green);font-size:17px;font-weight:400;padding:0;margin-bottom:20px;cursor:pointer;font-family:inherit;">
            <svg width="10" height="18" viewBox="0 0 10 18" fill="none"><path d="M9 1L1 9l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>返回
        </button>
        <div style="font-size:22px;font-weight:700;letter-spacing:-0.4px;margin-bottom:6px;" id="unitViewTitle">考卷目錄</div>
        <div style="font-size:14px;color:var(--sys-label2);margin-bottom:24px;">點選考卷開始練習</div>
        <div id="unitList" class="apple-card" style="margin-bottom:16px;"></div>
        <div id="unitPagination" style="display:none;justify-content:center;align-items:center;gap:24px;padding:16px 0;">
            <button onclick="window.prevUnitPage()" id="btnPrevUnit" class="page-btn">
                <svg width="9" height="16" viewBox="0 0 9 16" fill="none"><path d="M8 1L1 8l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
            <span id="unitPageNum" style="font-size:14px;font-weight:500;color:var(--sys-label2);">1 / 1</span>
            <button onclick="window.nextUnitPage()" id="btnNextUnit" class="page-btn">
                <svg width="9" height="16" viewBox="0 0 9 16" fill="none"><path d="M1 1l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
        </div>
    </div>

    <!-- [View 3] 進行測驗畫面 -->
    <div id="learnerQuiz" class="view-section" style="padding-left:20px;padding-right:20px;">
        <div id="quizContentArea">
            <button onclick="window.switchView('learnerHome')" style="display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--brand-green);font-size:17px;padding:0;margin-bottom:20px;cursor:pointer;font-family:inherit;">
                <svg width="10" height="18" viewBox="0 0 10 18" fill="none"><path d="M9 1L1 9l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>離開
            </button>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
                <span id="prog-text" style="font-size:13px;font-weight:600;color:var(--sys-label2);min-width:44px;font-variant-numeric:tabular-nums;">01/01</span>
                <div class="ios-progress-track" style="flex:1;"><div id="prog-bar" class="ios-progress-fill" style="width:0%;"></div></div>
                <span id="unit-badge" class="ios-badge">UNIT</span>
            </div>
            <div id="quiz-container"></div>
        </div>
        <div id="result-screen" class="hidden result-card" style="margin:8px 0;">
            <div style="font-size:56px;margin-bottom:12px;">🏆</div>
            <div style="font-size:22px;font-weight:700;letter-spacing:-0.4px;margin-bottom:4px;">練習完成</div>
            <div id="result-score-text" style="font-size:15px;color:var(--sys-label2);margin-bottom:6px;"></div>
            <div id="result-score-points" style="font-size:52px;font-weight:700;color:var(--brand-gold);letter-spacing:-1px;margin-bottom:32px;font-variant-numeric:tabular-nums;"></div>
            <button onclick="window.switchView('unitSelectView')" class="btn-primary">返回列表</button>
        </div>
    </div>

    <!-- [View 4] 管理端看板 -->
    <div id="adminSection" class="view-section" style="padding-left:20px;padding-right:20px;">
        <div class="segment-control" style="margin-bottom:24px;">
            <button onclick="window.switchAdminTab('management')" id="tabMan" class="segment-btn segment-active">出題管理</button>
            <button onclick="window.switchAdminTab('analytics')" id="tabAna" class="segment-btn">數據看板</button>
        </div>

        <div id="adminManagement">
            <div class="apple-card" style="padding:20px;margin-bottom:24px;box-shadow:0 2px 16px rgba(0,0,0,0.06);">
                <div style="display:flex;gap:8px;margin-bottom:20px;">
                    <button onclick="window.switchAdminCat('專業')" class="admin-cat-btn" style="background:var(--brand-green);color:#fff;">專業</button>
                    <button onclick="window.switchAdminCat('日常')" class="admin-cat-btn" style="background:var(--sys-fill);color:var(--sys-label2);">日常</button>
                </div>
                <div style="display:flex;flex-direction:column;gap:12px;">
                    <input type="text" id="unitTitleInput" class="ios-input" placeholder="設定卷宗名稱">
                    <div id="dropZone" class="drop-zone">
                        <div style="font-size:28px;margin-bottom:6px;">📂</div>
                        <div style="font-size:13px;font-weight:600;color:var(--sys-label2);text-transform:uppercase;letter-spacing:0.5px;">點擊導入素材</div>
                        <div style="font-size:12px;color:var(--sys-label3);margin-top:4px;">支援 PDF、DOCX、TXT</div>
                        <input type="file" id="fileInput" class="hidden" multiple>
                    </div>
                    <textarea id="rawText" class="ios-textarea" rows="4" placeholder="解析內容在此顯示..."></textarea>
                    <div id="aiLoader" class="ai-loader hidden">
                        <div id="aiProgressPercent" style="font-size:34px;font-weight:700;color:var(--brand-green);font-variant-numeric:tabular-nums;">0%</div>
                        <div class="ios-progress-track" style="margin-top:8px;">
                            <div id="aiProgressBar" style="height:100%;border-radius:100px;background:var(--brand-green);width:0%;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);"></div>
                        </div>
                        <div style="font-size:12px;color:var(--brand-green);margin-top:8px;font-weight:500;">AI 正在生成題目...</div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                        <button onclick="window.openCountModal('ai')" class="btn-tinted" style="border-radius:var(--sys-radius-sm);padding:14px;">✨ AI 智能出題</button>
                        <button onclick="window.openCountModal('manual')" class="btn-secondary" style="border-radius:var(--sys-radius-sm);padding:14px;font-size:14px;">✍️ 手動錄入</button>
                    </div>
                    <button id="publishBtn" class="btn-primary" style="background:var(--brand-gold);font-size:16px;">發布並同步</button>
                </div>
            </div>
            <div class="section-header">已發佈卷宗</div>
            <div id="publishedExamsList" class="apple-card" style="margin-bottom:20px;"></div>
            <div id="editArea" style="display:flex;flex-direction:column;gap:16px;"></div>
        </div>

        <div id="adminAnalytics" class="hidden" style="padding-bottom:40px;">
            <div style="background:rgba(0,161,155,0.06);border:1px solid rgba(0,161,155,0.12);border-radius:var(--sys-radius-sm);padding:12px 16px;margin-bottom:20px;">
                <div style="font-size:12px;font-weight:600;color:var(--brand-green);text-transform:uppercase;letter-spacing:0.5px;">全行精進數據</div>
            </div>
            <div id="analyticsList" style="display:flex;flex-direction:column;gap:12px;"></div>
            <div id="dashboardPagination" style="display:none;justify-content:center;align-items:center;gap:24px;padding:20px 0;border-top:0.5px solid var(--sys-separator);margin-top:8px;">
                <button onclick="window.prevDashPage()" id="btnPrevDash" class="page-btn"><svg width="9" height="16" viewBox="0 0 9 16" fill="none"><path d="M8 1L1 8l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
                <span id="dashPageNum" style="font-size:14px;font-weight:500;color:var(--sys-label2);">1 / 1</span>
                <button onclick="window.nextDashPage()" id="btnNextDash" class="page-btn"><svg width="9" height="16" viewBox="0 0 9 16" fill="none"><path d="M1 1l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
            </div>
        </div>
    </div>

    <!-- Welcome / Nickname Modal -->
    <div id="welcomeModal" style="display:none;position:fixed;inset:0;z-index:1400;align-items:center;justify-content:center;padding:24px;">
        <div class="modal-overlay" style="position:absolute;inset:0;"></div>
        <div style="position:relative;width:100%;max-width:380px;background:#fff;border-radius:28px;padding:36px 28px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.15);">
            <div style="font-size:52px;margin-bottom:16px;">👋</div>
            <div style="font-size:22px;font-weight:700;letter-spacing:-0.4px;margin-bottom:8px;">歡迎使用學習平台</div>
            <div style="font-size:14px;color:var(--sys-label2);line-height:1.6;margin-bottom:28px;">請輸入你的姓名或暱稱<br>之後就不需要再填了</div>
            <input type="text" id="nicknameInput" class="ios-input" placeholder="例如：小明、王大明" maxlength="10" style="text-align:center;font-size:18px;font-weight:600;margin-bottom:8px;" onkeydown="if(event.key==='Enter')window.saveNickname()">
            <div id="nicknameError" style="display:none;color:#FF3B30;font-size:12px;margin-bottom:8px;">請輸入名字才能繼續</div>
            <button onclick="window.saveNickname()" class="btn-primary" style="margin-top:12px;">開始學習</button>
        </div>
    </div>

    <!-- Admin Login Modal -->
    <div id="adminLoginModal" style="display:none;position:fixed;inset:0;z-index:1300;align-items:flex-end;justify-content:center;" onclick="if(event.target===this)window.cancelAdminLogin()">
        <div class="modal-overlay" style="position:absolute;inset:0;"></div>
        <div class="modal-sheet" style="position:relative;width:100%;max-width:540px;padding:28px 24px 40px;">
            <div style="width:36px;height:4px;background:var(--sys-separator);border-radius:2px;margin:0 auto 24px;"></div>
            <div style="text-align:center;margin-bottom:24px;">
                <div style="font-size:32px;margin-bottom:10px;">🔐</div>
                <div style="font-size:20px;font-weight:700;letter-spacing:-0.3px;">管理員登入</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:16px;">
                <div>
                    <div style="font-size:13px;font-weight:600;color:var(--sys-label2);margin-bottom:6px;padding-left:4px;">帳號</div>
                    <input type="text" id="adminUsernameInput" class="ios-input" placeholder="請輸入帳號" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('adminPasswordInput').focus()">
                </div>
                <div>
                    <div style="font-size:13px;font-weight:600;color:var(--sys-label2);margin-bottom:6px;padding-left:4px;">密碼</div>
                    <input type="password" id="adminPasswordInput" class="ios-input" placeholder="請輸入密碼" autocomplete="current-password" onkeydown="if(event.key==='Enter')window.submitAdminLogin()">
                </div>
            </div>
            <div id="adminLoginError" style="display:none;background:#FFF1F2;border:1px solid #FCA5A5;border-radius:10px;padding:10px 14px;color:#DC2626;font-size:13px;font-weight:500;margin-bottom:14px;text-align:center;">帳號或密碼錯誤，請再試一次</div>
            <div style="display:flex;flex-direction:column;gap:10px;">
                <button onclick="window.submitAdminLogin()" id="adminLoginBtn" class="btn-primary">登入</button>
                <button onclick="window.cancelAdminLogin()" class="btn-secondary">取消</button>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" style="display:none;position:fixed;inset:0;z-index:1200;align-items:flex-end;justify-content:center;" onclick="if(event.target===this)window.hideModal('previewModal')">
        <div class="modal-overlay" style="position:absolute;inset:0;"></div>
        <div class="modal-sheet" style="position:relative;width:100%;max-width:540px;padding:28px 24px 40px;max-height:88vh;overflow-y:auto;">
            <div style="width:36px;height:4px;background:var(--sys-separator);border-radius:2px;margin:0 auto 24px;"></div>
            <button onclick="window.hideModal('previewModal')" style="position:absolute;top:24px;right:20px;background:var(--sys-fill);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;color:var(--sys-label2);">✕</button>
            <div id="previewContent" style="display:flex;flex-direction:column;gap:12px;"></div>
            <button onclick="window.hideModal('previewModal')" class="btn-secondary" style="margin-top:24px;">關閉</button>
        </div>
    </div>

    <!-- Count Modal -->
    <div id="countModal" style="display:none;position:fixed;inset:0;z-index:1100;align-items:flex-end;justify-content:center;" onclick="if(event.target===this)window.closeModal()">
        <div class="modal-overlay" style="position:absolute;inset:0;"></div>
        <div class="modal-sheet" style="position:relative;width:100%;max-width:540px;padding:28px 24px 40px;">
            <div style="width:36px;height:4px;background:var(--sys-separator);border-radius:2px;margin:0 auto 20px;"></div>
            <div style="font-size:20px;font-weight:700;text-align:center;margin-bottom:20px;letter-spacing:-0.3px;">選擇題數</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
                <button onclick="window.selectCount(5, this)" class="count-btn">5 題</button>
                <button onclick="window.selectCount(10, this)" class="count-btn">10 題</button>
            </div>
            <div id="startActionContainer" style="display:none;margin-bottom:12px;">
                <button onclick="window.executeAction()" class="btn-primary">開始執行</button>
            </div>
            <button onclick="window.closeModal()" class="btn-secondary" style="color:var(--sys-label2);">取消</button>
        </div>
    </div>

    <!-- Resume Modal -->
    <div id="resumeModal" style="display:none;position:fixed;inset:0;z-index:1100;align-items:flex-end;justify-content:center;">
        <div class="modal-overlay" style="position:absolute;inset:0;"></div>
        <div class="modal-sheet" style="position:relative;width:100%;max-width:540px;padding:28px 24px 40px;text-align:center;">
            <div style="width:36px;height:4px;background:var(--sys-separator);border-radius:2px;margin:0 auto 20px;"></div>
            <div style="font-size:36px;margin-bottom:12px;">🔖</div>
            <div style="font-size:20px;font-weight:700;margin-bottom:6px;letter-spacing:-0.3px;">繼續上次進度？</div>
            <div style="font-size:14px;color:var(--sys-label2);margin-bottom:28px;line-height:1.5;">偵測到未完成的練習</div>
            <div style="display:flex;flex-direction:column;gap:10px;">
                <button onclick="window.confirmResume(true)" class="btn-primary">繼續</button>
                <button onclick="window.confirmResume(false)" class="btn-secondary">重新開始</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        window.showModal = (id) => { const el = document.getElementById(id); if(el) el.style.display = 'flex'; };
        window.hideModal = (id) => { const el = document.getElementById(id); if(el) el.style.display = 'none'; };

        // 暱稱管理
        window.userName = localStorage.getItem('user_name') || '';

        window.saveNickname = () => {
            const input = document.getElementById('nicknameInput');
            const errEl = document.getElementById('nicknameError');
            const name = input.value.trim();
            if (!name) { errEl.style.display = 'block'; return; }
            window.userName = name;
            localStorage.setItem('user_name', name);
            window.hideModal('welcomeModal');
            document.getElementById('navTitle').innerText = name + '，你好';
            window.showToast('歡迎，' + name + ' 🎉');
        };

        // 管理員登入邏輯
        window.adminPassword = sessionStorage.getItem('adminPw') || '';
        window.adminUsername = sessionStorage.getItem('adminUser') || '';

        window.cancelAdminLogin = () => {
            window.hideModal('adminLoginModal');
            document.getElementById('adminUsernameInput').value = '';
            document.getElementById('adminPasswordInput').value = '';
            document.getElementById('adminLoginError').style.display = 'none';
        };

        window.submitAdminLogin = async () => {
            const userInput = document.getElementById('adminUsernameInput');
            const pwInput = document.getElementById('adminPasswordInput');
            const errEl = document.getElementById('adminLoginError');
            const loginBtn = document.getElementById('adminLoginBtn');
            const user = userInput.value.trim();
            const pw = pwInput.value.trim();

            if (!user || !pw) {
                errEl.innerText = '請填寫帳號與密碼';
                errEl.style.display = 'block';
                return;
            }

            // 顯示loading狀態
            loginBtn.disabled = true;
            loginBtn.innerText = '驗證中...';
            errEl.style.display = 'none';

            try {
                const res = await fetch(API_BASE + '/verifyAdmin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Username': user,
                        'X-Admin-Password': pw
                    }
                });
                if (res.ok) {
                    window.adminPassword = pw;
                    window.adminUsername = user;
                    sessionStorage.setItem('adminPw', pw);
                    sessionStorage.setItem('adminUser', user);
                    window.cancelAdminLogin();
                    window.isAdminView = true;
                    window.switchView('adminSection');
                    const btn = document.getElementById('adminToggle');
                    btn.innerText = '登出';
                    btn.style.background = 'rgba(0,161,155,0.12)';
                    btn.style.color = 'var(--brand-green)';
                    window.switchAdminTab('management');
                    window.showToast('歡迎回來，' + user);
                } else {
                    errEl.innerText = '帳號或密碼錯誤，請再試一次';
                    errEl.style.display = 'block';
                    pwInput.value = '';
                    pwInput.focus();
                }
            } catch(e) {
                errEl.innerText = '連線異常，請稍後再試';
                errEl.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerText = '登入';
            }
        };

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            if (!t) return;
            t.innerText = msg; t.style.opacity = '1';
            clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => t.style.opacity = '0', 3500);
        };

        window.switchView = (viewId) => {
            ['learnerHome','unitSelectView','learnerQuiz','adminSection'].forEach(id => {
                const el = document.getElementById(id);
                if (id === viewId) { el.style.display = 'block'; el.classList.add('view-active'); }
                else { el.style.display = 'none'; el.classList.remove('view-active'); }
            });
            const titleMap = { learnerHome:'同仁，你好', unitSelectView:'考卷目錄', learnerQuiz:'練習中', adminSection:'管理後台' };
            document.getElementById('navTitle').innerText = titleMap[viewId] || '智慧學習平台';
            window.scrollTo(0, 0);
        };

        window.handleAdminToggle = () => {
            const btn = document.getElementById('adminToggle');
            if (window.isAdminView) {
                // 登出
                window.isAdminView = false;
                window.adminPassword = '';
                sessionStorage.removeItem('adminPw');
                window.switchView('learnerHome');
                btn.innerText = '管理員';
                btn.style.background = 'var(--sys-fill)';
                btn.style.color = 'var(--sys-label2)';
            } else {
                // 顯示登入框
                document.getElementById('adminLoginError').style.display = 'none';
                document.getElementById('adminPasswordInput').value = '';
                window.showModal('adminLoginModal');
                setTimeout(() => document.getElementById('adminPasswordInput').focus(), 300);
            }
        };

        window.saveProgress = () => { if (!window.currentExamId) return; localStorage.setItem(`save_${window.currentExamId}`, JSON.stringify({ currentIdx: window.currentIdx, score: window.score, wrongIndices: window.wrongIndices })); };
        window.clearProgress = (id) => localStorage.removeItem(`save_${id}`);
        window.loadProgress = (id) => JSON.parse(localStorage.getItem(`save_${id}`));

        async function apiRequest(path, options = {}) {
            try {
                // 管理員專用 API 自動帶上帳號+密碼 header
                const adminPaths = ['/saveExam', '/deleteExam', '/getRecords', '/aiProxy'];
                if (adminPaths.some(p => path.startsWith(p))) {
                    options.headers = {
                        ...options.headers,
                        'X-Admin-Username': window.adminUsername || '',
                        'X-Admin-Password': window.adminPassword || ''
                    };
                }
                const res = await fetch(API_BASE + path, options);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || `Code ${res.status}`);
                return data;
            } catch (e) { window.showToast("同步異常，請稍後再試"); return null; }
        }

        async function checkConnection() {
            const dot = document.getElementById('netStatus');
            const txt = document.getElementById('netStatusText');
            try {
                const res = await fetch(API_BASE + "/getExams");
                if (res.ok) { dot.style.background = '#34C759'; txt.innerText = 'Online'; }
            } catch (e) { dot.style.background = '#FF3B30'; txt.innerText = 'Offline'; }
        }

        window.onSelectCategory = async (cat) => {
            window.currentCategory = cat; window.unitCurrentPage = 0;
            document.getElementById('unitViewTitle').innerText = cat === '專業' ? '專業知識' : '日常規範';
            window.switchView('unitSelectView');
            window.showToast('同步數據中...');
            const data = await apiRequest("/getExams");
            if (data) { window.allExams = data; window.renderUnitSelect(); }
        };

        window.renderUnitSelect = () => {
            const list = document.getElementById('unitList'); if (!list) return;
            const filtered = (window.allExams || []).filter(e => e.category === window.currentCategory);
            const totalPages = Math.ceil(filtered.length / window.unitPageSize);
            const paged = filtered.slice(window.unitCurrentPage * window.unitPageSize, (window.unitCurrentPage + 1) * window.unitPageSize);
            if (filtered.length === 0) { list.innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--sys-label3);font-size:15px;">目前暫無單元</div>`; return; }
            list.innerHTML = paged.map((u, i) => `
                <div onclick="window.startExam('${u.id}')" class="ios-row" style="${i===0?'border-radius:16px 16px 0 0;':''}${i===paged.length-1?'border-radius:0 0 16px 16px;border-bottom:none;':''}">
                    <div style="width:40px;height:40px;background:rgba(0,161,155,0.08);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-right:14px;font-size:18px;">📝</div>
                    <div style="flex:1;">
                        <div style="font-size:16px;font-weight:500;letter-spacing:-0.2px;">${u.title}</div>
                        <div style="font-size:13px;color:var(--sys-label2);margin-top:2px;">${u.questions.length} 題</div>
                    </div>
                    <svg width="9" height="16" viewBox="0 0 9 16" fill="none"><path d="M1 1l7 7-7 7" stroke="#C6C6C8" stroke-width="2" stroke-linecap="round"/></svg>
                </div>`).join('');
            const paginator = document.getElementById('unitPagination');
            if (totalPages > 1) {
                paginator.style.display = 'flex';
                document.getElementById('unitPageNum').innerText = `${window.unitCurrentPage + 1} / ${totalPages}`;
                document.getElementById('btnPrevUnit').disabled = window.unitCurrentPage === 0;
                document.getElementById('btnNextUnit').disabled = window.unitCurrentPage >= totalPages - 1;
            } else { paginator.style.display = 'none'; }
        };

        window.prevUnitPage = () => { if (window.unitCurrentPage > 0) { window.unitCurrentPage--; window.renderUnitSelect(); } };
        window.nextUnitPage = () => { window.unitCurrentPage++; window.renderUnitSelect(); };

        window.startExam = (id) => {
            const ex = window.allExams.find(e => e.id === id); if (!ex) return;
            window.currentExamId = id;
            const saved = window.loadProgress(id);
            if (saved && saved.currentIdx > 0) window.showModal('resumeModal');
            else window.initNewExam();
        };

        window.confirmResume = (shouldResume) => {
            window.hideModal('resumeModal');
            const ex = window.allExams.find(e => e.id === window.currentExamId);
            window.quizData = ex.questions;
            if (shouldResume) {
                const s = window.loadProgress(window.currentExamId);
                window.currentIdx = s.currentIdx; window.score = s.score; window.wrongIndices = s.wrongIndices || [];
            } else {
                window.currentIdx = 0; window.score = 0; window.wrongIndices = [];
                window.clearProgress(window.currentExamId);
            }
            window.switchView('learnerQuiz');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quizContentArea').classList.remove('hidden');
            document.getElementById('unit-badge').innerText = ex.title;
            window.renderQuestion();
        };

        window.initNewExam = () => {
            const ex = window.allExams.find(e => e.id === window.currentExamId);
            window.quizData = ex.questions; window.currentIdx = 0; window.score = 0; window.wrongIndices = [];
            window.switchView('learnerQuiz');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quizContentArea').classList.remove('hidden');
            document.getElementById('unit-badge').innerText = ex.title;
            window.renderQuestion();
        };

        window.renderQuestion = () => {
            const container = document.getElementById('quiz-container'); if (!container) return;
            const item = window.quizData[window.currentIdx]; if (!item) return;
            const total = window.quizData.length;
            document.getElementById('prog-text').innerText = `${String(window.currentIdx+1).padStart(2,'0')}/${String(total).padStart(2,'0')}`;
            document.getElementById('prog-bar').style.width = `${((window.currentIdx+1)/total)*100}%`;
            container.innerHTML = `
                <div class="apple-card" style="padding:22px;margin-bottom:16px;box-shadow:0 2px 16px rgba(0,0,0,0.06);">
                    <div style="font-size:${item.q.length>50?'15px':'17px'};font-weight:600;line-height:1.55;letter-spacing:-0.2px;margin-bottom:20px;">${item.q}</div>
                    <div style="display:flex;flex-direction:column;gap:10px;">
                        ${item.o.map((opt,i) => `
                            <button onclick="window.handleSelect(${i})" class="quiz-btn" id="qbtn-${i}">
                                <span style="line-height:1.45;">${opt}</span>
                                <span id="fb-${i}" style="font-size:18px;opacity:0;flex-shrink:0;margin-left:8px;"></span>
                            </button>`).join('')}
                    </div>
                    <div id="expl-box" class="hidden" style="margin-top:20px;padding-top:18px;border-top:0.5px solid var(--sys-separator);">
                        <div class="expl-box" style="margin-bottom:16px;">
                            <div style="font-size:12px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">解析</div>
                            ${item.i}
                        </div>
                        <button onclick="window.nextQuest()" class="btn-primary">下一題</button>
                    </div>
                </div>`;
        };

        window.handleSelect = (idx) => {
            const correct = window.quizData[window.currentIdx].a;
            document.querySelectorAll('.quiz-btn').forEach(b => b.disabled = true);
            const fbIdx = document.getElementById(`fb-${idx}`);
            const fbCorr = document.getElementById(`fb-${correct}`);
            const btnIdx = document.getElementById(`qbtn-${idx}`);
            const btnCorr = document.getElementById(`qbtn-${correct}`);
            if (idx == correct) {
                window.score++;
                btnIdx.style.background='#F0FDF4'; btnIdx.style.borderColor='#86EFAC'; btnIdx.style.color='#15803D';
                if(fbIdx){fbIdx.innerText='✓';fbIdx.style.opacity='1';fbIdx.style.color='#15803D';}
            } else {
                window.wrongIndices.push(window.currentIdx);
                btnIdx.style.background='#FFF1F2'; btnIdx.style.borderColor='#FCA5A5'; btnIdx.style.color='#DC2626';
                if(fbIdx){fbIdx.innerText='✗';fbIdx.style.opacity='1';fbIdx.style.color='#DC2626';}
                btnCorr.style.background='#F0FDF4'; btnCorr.style.borderColor='#86EFAC'; btnCorr.style.color='#15803D';
                if(fbCorr){fbCorr.innerText='✓';fbCorr.style.opacity='1';fbCorr.style.color='#15803D';}
            }
            document.getElementById('expl-box').classList.remove('hidden');
            window.saveProgress();
        };

        window.nextQuest = () => { window.currentIdx++; if(window.currentIdx<window.quizData.length) window.renderQuestion(); else window.showFinalResult(); };

        window.showFinalResult = () => {
            document.getElementById('quizContentArea').classList.add('hidden');
            const rs = document.getElementById('result-screen'); rs.classList.remove('hidden');
            const total = window.quizData.length;
            const points = Math.round((window.score/total)*100);
            document.getElementById('result-score-text').innerText = `答對 ${window.score} / ${total} 題`;
            document.getElementById('result-score-points').innerText = `${points}`;
            window.clearProgress(window.currentExamId);
            apiRequest("/saveRecord",{method:'POST',body:JSON.stringify({examId:window.currentExamId,score:window.score,total,wrongIndices:window.wrongIndices,userName:window.userName||'匿名'})});
        };

        window.switchAdminTab = (tab) => {
            window.adminTab = tab;
            document.getElementById('tabMan').className = tab==='management'?'segment-btn segment-active':'segment-btn';
            document.getElementById('tabAna').className = tab==='analytics'?'segment-btn segment-active':'segment-btn';
            document.getElementById('adminManagement').style.display = tab==='management'?'block':'none';
            document.getElementById('adminAnalytics').style.display = tab==='analytics'?'block':'none';
            if(tab==='management') window.renderPublishedManagement();
            if(tab==='analytics'){window.dashboardCurrentPage=0;window.renderAnalytics();}
        };

        window.renderPublishedManagement = async () => {
            const area = document.getElementById('publishedExamsList');
            area.innerHTML = `<div style="padding:20px;text-align:center;color:var(--sys-label3);font-size:14px;">同步中...</div>`;
            const data = await apiRequest("/getExams") || []; window.allExams = data;
            const filtered = data.filter(e => e.category===window.currentCategory);
            if(filtered.length===0){area.innerHTML=`<div style="padding:28px 20px;text-align:center;color:var(--sys-label3);font-size:14px;border:1.5px dashed var(--sys-separator);border-radius:var(--sys-radius-md);">目前無單元</div>`;return;}
            area.innerHTML = filtered.map((ex,i)=>`
                <div class="ios-row" style="${i===0?'border-radius:16px 16px 0 0;':''}${i===filtered.length-1?'border-radius:0 0 16px 16px;border-bottom:none;':''}">
                    <div style="flex:1;">
                        <div style="font-size:15px;font-weight:500;">${ex.title}</div>
                        <div style="font-size:12px;color:var(--sys-label2);margin-top:2px;">${ex.questions.length} 題</div>
                    </div>
                    <button onclick="window.deleteExam('${ex.id}','${ex.title}')" style="background:rgba(255,59,48,0.1);border:none;color:#FF3B30;padding:7px 12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">刪除</button>
                </div>`).join('');
        };

        window.deleteExam = async (id,title) => {
            if(confirm(`確定要移除「${title}」嗎？`)){
                const res = await apiRequest("/deleteExam",{method:'POST',body:JSON.stringify({id})});
                if(res){window.showToast("已成功移除");window.renderPublishedManagement();}
            }
        };

        window.renderAnalytics = async () => {
            const area = document.getElementById('analyticsList');
            area.innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--sys-label3);font-size:14px;">讀取中...</div>`;
            const [exams,records] = await Promise.all([apiRequest("/getExams"),apiRequest("/getRecords")]);
            if(!exams||!records) return;
            const activeExams = exams.filter(ex=>records.some(r=>r.examId===ex.id));
            const totalPages = Math.ceil(activeExams.length/window.dashboardPageSize);
            const paged = activeExams.slice(window.dashboardCurrentPage*window.dashboardPageSize,(window.dashboardCurrentPage+1)*window.dashboardPageSize);
            if(activeExams.length===0){area.innerHTML=`<div style="padding:40px 20px;text-align:center;color:var(--sys-label3);font-size:14px;">尚無數據</div>`;return;}
            area.innerHTML = paged.map(ex=>{
                const exRecs=records.filter(r=>r.examId===ex.id);
                const count=exRecs.length;
                const avg=(exRecs.reduce((s,c)=>s+(c.score/c.total*100),0)/count).toFixed(1);
                const threshold=Math.round(count*0.3);
                const errorCounts=new Array(ex.questions.length).fill(0);
                exRecs.forEach(r=>(r.wrongIndices||[]).forEach(idx=>errorCounts[idx]++));
                const blindSpots=errorCounts.map((e,i)=>({i,e})).filter(x=>x.e>=threshold&&x.e>0);
                const blindHtml=blindSpots.length>0?`
                    <div style="margin-top:14px;padding:12px;background:#FFF1F2;border-radius:10px;">
                        <div style="font-size:11px;font-weight:700;color:#DC2626;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">知識盲區 (≥${threshold} 人答錯)</div>
                        <div style="display:flex;flex-wrap:wrap;gap:6px;">
                            ${blindSpots.map(bs=>`<button onclick="window.previewBlindSpot('${ex.id}',${bs.i})" class="blindspot-tag">Q${bs.i+1} · ${bs.e}人</button>`).join('')}
                        </div>
                    </div>`:'';
                // 個人成績列表
                const memberRows = exRecs.map(r => {
                    const pts = Math.round(r.score / r.total * 100);
                    const name = r.userName || '匿名';
                    const date = new Date(r.t).toLocaleDateString('zh-TW', {month:'numeric',day:'numeric'});
                    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--sys-separator);">
                        <div style="font-size:14px;font-weight:500;">${name}</div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <span style="font-size:11px;color:var(--sys-label3);">${date}</span>
                            <span style="font-size:15px;font-weight:700;color:${pts<70?'#FF3B30':'var(--brand-green)'};font-variant-numeric:tabular-nums;min-width:40px;text-align:right;">${pts}分</span>
                        </div>
                    </div>`;
                }).join('');

                return `
                    <div class="analytics-card">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
                            <div>
                                <span style="font-size:11px;font-weight:600;background:var(--sys-fill);color:var(--sys-label2);padding:2px 8px;border-radius:4px;margin-bottom:6px;display:inline-block;">${ex.category}</span>
                                <div style="font-size:16px;font-weight:600;letter-spacing:-0.2px;">${ex.title}</div>
                                <div style="font-size:13px;color:var(--sys-label2);margin-top:2px;">${count} 人參與 · 平均 <span style="font-weight:700;color:${parseFloat(avg)<70?'#FF3B30':'var(--brand-green)'};">${avg} 分</span></div>
                            </div>
                        </div>
                        <div style="margin-bottom:12px;">${memberRows}</div>
                        ${blindHtml}
                    </div>`;
            }).join('');
            const paginator=document.getElementById('dashboardPagination');
            if(totalPages>1){
                paginator.style.display='flex';
                document.getElementById('dashPageNum').innerText=`${window.dashboardCurrentPage+1} / ${totalPages}`;
                document.getElementById('btnPrevDash').disabled=window.dashboardCurrentPage===0;
                document.getElementById('btnNextDash').disabled=window.dashboardCurrentPage>=totalPages-1;
            } else {paginator.style.display='none';}
        };

        window.prevDashPage = () => {if(window.dashboardCurrentPage>0){window.dashboardCurrentPage--;window.renderAnalytics();}};
        window.nextDashPage = () => {window.dashboardCurrentPage++;window.renderAnalytics();};

        window.previewBlindSpot = (examId,qIdx) => {
            const exam=window.allExams.find(e=>e.id===examId); if(!exam) return;
            const q=exam.questions[qIdx];
            document.getElementById('previewContent').innerHTML=`
                <div style="font-size:12px;font-weight:700;color:var(--brand-green);text-transform:uppercase;letter-spacing:0.5px;">${exam.category} · ${exam.title}</div>
                <div style="font-size:17px;font-weight:600;line-height:1.5;letter-spacing:-0.2px;">${q.q}</div>
                <div style="display:flex;flex-direction:column;gap:8px;">
                    ${q.o.map((opt,i)=>`
                        <div style="padding:12px 14px;border-radius:10px;font-size:14px;
                            background:${q.a==i?'#F0FDF4':'var(--sys-fill)'};
                            border:1px solid ${q.a==i?'#86EFAC':'transparent'};
                            color:${q.a==i?'#15803D':'var(--sys-label2)'};
                            font-weight:${q.a==i?'600':'400'};">
                            ${opt}${q.a==i?' ✓':''}
                        </div>`).join('')}
                </div>
                <div class="expl-box"><div style="font-size:12px;font-weight:700;color:#92400E;margin-bottom:6px;">解析</div>${q.i}</div>`;
            window.showModal('previewModal');
        };

        window.updateAiProgress = (pct) => {
            const bar=document.getElementById('aiProgressBar'); const txt=document.getElementById('aiProgressPercent');
            if(bar) bar.style.width=pct+'%'; if(txt) txt.innerText=pct+'%';
        };
        window.openCountModal = (action) => { window.pendingAction=action; window.showModal('countModal'); };
        window.closeModal = () => { window.hideModal('countModal'); document.getElementById('startActionContainer').style.display='none'; };
        window.selectCount = (count,btn) => {
            window.selectedCount=count;
            document.querySelectorAll('.count-btn').forEach(b=>b.classList.remove('count-btn-active'));
            btn.classList.add('count-btn-active');
            document.getElementById('startActionContainer').style.display='block';
        };
        window.executeAction = async () => { const c=window.selectedCount; const a=window.pendingAction; window.closeModal(); if(a==='ai') await window.executeAiGen(c); else window.executeManualAdd(c); };

        window.executeAiGen = async (count) => {
            const text=document.getElementById('rawText')?.value; if(!text) return window.showToast("請先提供素材內容");
            const loader=document.getElementById('aiLoader'); loader.classList.remove('hidden');
            const mcCount=Math.ceil(count*0.3); const tfCount=count-mcCount;
            window.updateAiProgress(10);
            try {
                const prompt=`你是一位資深銀行顧問。請根據素材產出共 ${count} 題。要求：必須包含 ${mcCount} 題「情境選擇題」以及 ${tfCount} 題「是非題」。是非題選項固定 ["正確", "錯誤"]。每題附深度解析。格式：純 JSON Array [ {"q":"題目","o":["A","B","C","D"],"a":0,"i":"解析"} ]。內容：\n${text}`;
                window.updateAiProgress(40);
                const res=await apiRequest("/aiProxy",{method:'POST',body:JSON.stringify({prompt})});
                if(res){
                    window.updateAiProgress(85);
                    const content=res.choices?.[0]?.message?.content||"";
                    const s=content.indexOf('['); const e=content.lastIndexOf(']')+1;
                    window.tempEditData=window.tempEditData.concat(JSON.parse(content.substring(s,e)));
                    window.renderEditCards();
                    window.updateAiProgress(100);
                    setTimeout(()=>{window.showToast('AI 出題完成');loader.classList.add('hidden');},600);
                } else {loader.classList.add('hidden');}
            } catch(e){window.showToast("AI 出題失敗，請重試");loader.classList.add('hidden');}
        };

        window.executeManualAdd = (count) => {
            for(let i=0;i<count;i++) window.tempEditData.push({q:"請輸入題目",o:["選項 A","選項 B","選項 C","選項 D"],a:0,i:"請輸入解析"});
            window.renderEditCards(); window.showToast(`已新增 ${count} 個題目模板`);
        };

        window.renderEditCards = () => {
            const area=document.getElementById('editArea'); if(!area) return;
            area.innerHTML=window.tempEditData.map((d,i)=>`
                <div class="apple-card" style="padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
                        <div style="width:28px;height:28px;background:var(--brand-green);color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;">${i+1}</div>
                        <button onclick="window.tempEditData.splice(${i},1);window.renderEditCards();" style="background:rgba(255,59,48,0.1);border:none;color:#FF3B30;padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">刪除</button>
                    </div>
                    <input type="text" value="${d.q}" oninput="window.tempEditData[${i}].q=this.value" class="ios-input" style="margin-bottom:12px;font-weight:500;" placeholder="題目內容">
                    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;">
                        ${d.o.map((o,oi)=>`
                            <div style="display:flex;align-items:center;gap:10px;background:var(--sys-fill);padding:10px 14px;border-radius:10px;border:1.5px solid ${d.a==oi?'var(--brand-green)':'transparent'};">
                                <input type="radio" name="corr_${i}" ${d.a==oi?'checked':''} onchange="window.tempEditData[${i}].a=${oi};window.renderEditCards();" style="accent-color:var(--brand-green);width:18px;height:18px;flex-shrink:0;">
                                <input type="text" value="${o}" oninput="window.tempEditData[${i}].o[${oi}]=this.value" style="background:transparent;border:none;outline:none;font-size:14px;width:100%;font-family:inherit;color:var(--sys-label);">
                            </div>`).join('')}
                    </div>
                    <textarea oninput="window.tempEditData[${i}].i=this.value" class="ios-textarea" rows="3" style="background:#FFFBEB;border:1px solid #FDE68A;" placeholder="解析說明...">${d.i}</textarea>
                </div>`).join('');
        };

        window.switchAdminCat = (cat) => {
            window.currentCategory=cat;
            document.querySelectorAll('.admin-cat-btn').forEach(btn=>{
                const isActive=btn.innerText===cat;
                btn.style.background=isActive?'var(--brand-green)':'var(--sys-fill)';
                btn.style.color=isActive?'#fff':'var(--sys-label2)';
            });
            window.tempEditData=[]; window.renderEditCards();
            if(window.isAdminView) window.renderPublishedManagement();
        };

        document.addEventListener('DOMContentLoaded',()=>{
            checkConnection();
            // 檢查是否已有暱稱
            if (!window.userName) {
                window.showModal('welcomeModal');
                setTimeout(() => document.getElementById('nicknameInput').focus(), 300);
            } else {
                document.getElementById('navTitle').innerText = window.userName + '，你好';
            }
            const dropZone=document.getElementById('dropZone');
            const fileInput=document.getElementById('fileInput');
            const publishBtn=document.getElementById('publishBtn');
            if(dropZone&&fileInput){
                dropZone.onclick=()=>fileInput.click();
                fileInput.onchange=async(e)=>{
                    for(let file of Array.from(e.target.files)){
                        if(file.name.endsWith('.txt')){const r=new FileReader();r.onload=ev=>document.getElementById('rawText').value+=ev.target.result;r.readAsText(file);}
                        else if(file.name.endsWith('.docx')){const ab=await file.arrayBuffer();const res=await mammoth.extractRawText({arrayBuffer:ab});document.getElementById('rawText').value+=res.value;}
                        else if(file.type==='application/pdf'){const ab=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument(new Uint8Array(ab)).promise;let t='';for(let p=1;p<=pdf.numPages;p++){const pg=await pdf.getPage(p);const ct=await pg.getTextContent();t+=ct.items.map(s=>s.str).join(' ')+'\n';}document.getElementById('rawText').value+=t;}
                    }
                    window.showToast('素材載入成功');
                };
            }
            publishBtn.onclick=async()=>{
                const title=document.getElementById('unitTitleInput')?.value;
                if(!title) return window.showToast("請先輸入卷宗名稱");
                if(window.tempEditData.length===0) return window.showToast("尚無題目可上傳");
                publishBtn.disabled=true; publishBtn.innerText='同步中...';
                const res=await apiRequest("/saveExam",{method:'POST',body:JSON.stringify({category:window.currentCategory,title,questions:window.tempEditData})});
                if(res){window.showToast("發布成功！同仁端已同步");window.tempEditData=[];document.getElementById('unitTitleInput').value='';window.renderEditCards();window.renderPublishedManagement();}
                publishBtn.disabled=false; publishBtn.innerText='發布並同步';
            };
        });
    </script>
</body>
</html>
