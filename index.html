<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>企業智慧學習平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        :root { --esun-green: #006D41; --esun-gold: #D4AF37; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f4f7f5; color: #1a1a1a; margin: 0; -webkit-tap-highlight-color: transparent; }
        .esun-bg-green { background-color: var(--esun-green); }
        .esun-text-green { color: var(--esun-green); }
        .esun-bg-gold { background-color: var(--esun-gold); }
        .slide-in { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loading-dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .card-active:active { transform: scale(0.96); background-color: #f0fdf4; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <script>
        // 核心配置：請務必確認網址正確且不含結尾斜線
        const CLOUDFLARE_WORKER_API = "https://bank-study-api.insa-eco.workers.dev"; 

        window.currentCategory = "TMU";
        window.allExams = []; 
        window.tempEditData = [];
        window.quizData = [];
        window.currentIdx = 0;
        window.score = 0;
    </script>

    <!-- 導航列 -->
    <nav class="bg-white shadow-sm px-4 py-3 flex justify-between items-center sticky top-0 z-50 border-b-2 border-[#D4AF37]">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 esun-bg-green rounded-lg flex items-center justify-center text-white font-bold text-xs">智庫</div>
            <h1 class="font-bold text-gray-800 text-base">智慧學習平台</h1>
        </div>
        <div class="flex bg-gray-100 p-1 rounded-lg scale-90">
            <button id="viewLearner" class="text-xs px-4 py-1.5 rounded-md font-bold transition-all bg-white esun-text-green shadow-sm">學員端</button>
            <button id="viewAdmin" class="text-xs px-4 py-1.5 rounded-md font-bold transition-all text-gray-400 ml-1">管理端</button>
        </div>
    </nav>

    <!-- 學員模式 -->
    <div id="learnerSection" class="max-w-xl mx-auto p-4 py-6 slide-in">
        <div id="learnerHome" class="space-y-8">
            <div class="text-center space-y-1">
                <h2 class="text-2xl font-bold text-gray-800">專業知識地圖</h2>
                <p class="text-gray-400 text-[10px] uppercase tracking-widest font-bold">Cloud Sync Active</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="window.onSelectCategory('TMU')" class="card-active bg-white p-6 rounded-3xl border-b-4 border-emerald-600 text-center shadow-sm">
                    <div class="text-4xl mb-2">📈</div><h3 class="font-bold text-sm text-gray-700">TMU</h3>
                </div>
                <div onclick="window.onSelectCategory('存匯')" class="card-active bg-white p-6 rounded-3xl border-b-4 border-blue-600 text-center shadow-sm">
                    <div class="text-4xl mb-2">💰</div><h3 class="font-bold text-sm text-gray-700">存匯</h3>
                </div>
                <div onclick="window.onSelectCategory('授信')" class="card-active bg-white p-6 rounded-3xl border-b-4 border-orange-500 text-center shadow-sm">
                    <div class="text-4xl mb-2">📜</div><h3 class="font-bold text-sm text-gray-700">授信</h3>
                </div>
                <div onclick="window.onSelectCategory('零售')" class="card-active bg-white p-6 rounded-3xl border-b-4 border-purple-500 text-center shadow-sm">
                    <div class="text-4xl mb-2">🛍️</div><h3 class="font-bold text-sm text-gray-700">零售</h3>
                </div>
            </div>
            <p class="text-center text-[10px] text-gray-300">若看不到新考卷，請嘗試往下拉刷新頁面</p>
        </div>

        <!-- 單元清單 -->
        <div id="unitSelectView" class="hidden space-y-4">
            <button onclick="window.backToCategories()" class="text-xs text-gray-400 font-bold flex items-center">← 返回</button>
            <div id="unitList" class="space-y-3"></div>
        </div>

        <!-- 測驗區域 -->
        <div id="learnerQuiz" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm p-4 mb-4 border border-gray-100 flex items-center justify-between">
                <span id="prog-text" class="text-[10px] font-bold text-gray-400 font-mono">01 / 00</span>
                <div class="flex-1 mx-4 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                    <div id="prog-bar" class="esun-bg-gold h-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <span id="unit-badge" class="text-[9px] esun-bg-green text-white px-2 py-0.5 rounded-full truncate max-w-[80px]">UNIT</span>
            </div>
            <div id="quiz-container"></div>
            <div id="result-screen" class="hidden bg-white rounded-3xl shadow-xl p-10 text-center slide-in">
                <div class="text-6xl mb-6">🏆</div>
                <h2 class="text-xl font-bold mb-2">學習達標</h2>
                <p id="result-msg" class="text-xs text-gray-500 mb-8"></p>
                <button onclick="window.backToUnits()" class="w-full esun-bg-green text-white font-bold py-4 rounded-xl shadow-lg">返回單元清單</button>
            </div>
        </div>
    </div>

    <!-- 管理端 (手機端隱藏部分功能以保證流暢) -->
    <div id="adminSection" class="hidden p-4 slide-in max-w-xl mx-auto">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-4">
            <h3 class="text-xs font-bold text-gray-400 uppercase mb-3 italic">Manager Console</h3>
            <div class="flex flex-wrap gap-2 mb-6">
                <button onclick="window.switchAdminCat('TMU')" class="admin-cat-btn px-4 py-1.5 rounded-lg text-xs font-bold esun-bg-green text-white">TMU</button>
                <button onclick="window.switchAdminCat('存匯')" class="admin-cat-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-gray-100 text-gray-400">存匯</button>
                <button onclick="window.switchAdminCat('授信')" class="admin-cat-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-gray-100 text-gray-400">授信</button>
                <button onclick="window.switchAdminCat('零售')" class="admin-cat-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-gray-100 text-gray-400">零售</button>
            </div>
            <input type="text" id="unitTitleInput" class="w-full p-3 mb-4 border border-gray-100 rounded-xl text-sm font-bold bg-gray-50" placeholder="考卷名稱">
            <div id="dropZone" class="border-2 border-dashed border-gray-200 rounded-xl p-6 text-center mb-4">
                <div class="text-2xl mb-1">📂</div>
                <p class="text-[10px] text-gray-400 uppercase">點擊導入 PDF/Word</p>
                <input type="file" id="fileInput" class="hidden" multiple>
            </div>
            <textarea id="rawText" class="w-full h-24 p-3 bg-gray-50 border border-gray-100 rounded-xl text-xs mb-4 focus:outline-none" placeholder="素材文字..."></textarea>
            <button id="aiGenBtn" class="w-full esun-bg-green text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 mb-3">✨ 啟動 AI 智能出題</button>
            <button id="publishBtn" class="w-full bg-[#D4AF37] text-white font-bold py-4 rounded-xl shadow-lg active:scale-95">🚀 正式發布至雲端</button>
        </div>
        <div id="aiLoader" class="hidden py-10 text-center"><div class="flex justify-center gap-2 mb-2"><div class="w-2 h-2 esun-bg-green rounded-full loading-dot"></div><div class="w-2 h-2 esun-bg-green rounded-full loading-dot" style="animation-delay: 0.2s"></div><div class="w-2 h-2 esun-bg-green rounded-full loading-dot" style="animation-delay: 0.4s"></div></div><p class="text-[10px] text-gray-400 uppercase">AI Analyzing...</p></div>
        <div id="editArea" class="space-y-4 pb-20"></div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-xs font-bold shadow-2xl opacity-0 transition-all pointer-events-none z-[100] whitespace-nowrap"></div>

    <script type="module">
        const getUrl = (p) => CLOUDFLARE_WORKER_API.replace(/\/$/, "") + p;

        async function fetchCloud() {
            try {
                const res = await fetch(getUrl("/getExams"), { cache: 'no-store' });
                if(!res.ok) throw new Error("Worker 連線失敗");
                return await res.json();
            } catch (e) {
                window.showToast("❌ 無法連線雲端，請檢查網路");
                return [];
            }
        }

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg; t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 4000);
        };

        window.onSelectCategory = async (cat) => {
            window.currentCategory = cat;
            document.getElementById('learnerHome').classList.add('hidden');
            document.getElementById('unitSelectView').classList.remove('hidden');
            window.showToast(`🔍 正在同步 ${cat} 資料庫...`);
            window.allExams = await fetchCloud();
            window.renderUnitList();
        };

        window.renderUnitList = () => {
            const list = document.getElementById('unitList');
            const filtered = (window.allExams || []).filter(e => e.category === window.currentCategory);
            if (filtered.length === 0) { list.innerHTML = `<div class="py-10 text-center text-gray-300 italic text-xs">目前尚無考卷</div>`; return; }
            list.innerHTML = filtered.map(u => `
                <div onclick="window.startExam('${u.id}')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-50 flex justify-between items-center card-active">
                    <div><h4 class="font-bold text-gray-700 text-sm">${u.title}</h4><span class="text-[9px] text-gray-400">${u.questions.length} 題案例練習</span></div>
                    <div class="text-emerald-500 text-lg">▶</div>
                </div>`).join('');
        };

        window.startExam = (id) => {
            const ex = window.allExams.find(e => e.id === id);
            if(!ex) return;
            window.quizData = ex.questions; window.currentIdx = 0; window.score = 0;
            document.getElementById('unitSelectView').classList.add('hidden');
            document.getElementById('learnerQuiz').classList.remove('hidden');
            document.getElementById('unit-badge').innerText = ex.title;
            window.renderQuestion();
        };

        window.backToCategories = () => { document.getElementById('unitSelectView').classList.add('hidden'); document.getElementById('learnerHome').classList.remove('hidden'); };
        window.backToUnits = () => { document.getElementById('learnerQuiz').classList.add('hidden'); document.getElementById('unitSelectView').classList.remove('hidden'); window.renderUnitList(); };

        window.renderQuestion = () => {
            const container = document.getElementById('quiz-container');
            const item = window.quizData[window.currentIdx]; if(!item) return;
            document.getElementById('prog-text').innerText = `${window.currentIdx + 1} / ${window.quizData.length}`;
            document.getElementById('prog-bar').style.width = `${((window.currentIdx + 1) / window.quizData.length) * 100}%`;
            container.innerHTML = `
                <div class="bg-white rounded-3xl shadow-sm p-6 mb-4 slide-in border border-gray-50">
                    <h3 class="text-lg font-bold text-gray-800 leading-snug mb-6">${item.q}</h3>
                    <div class="space-y-3">
                        ${item.o.map((opt, i) => `<button onclick="window.handleSelect(${i})" class="quiz-btn w-full text-left p-4 rounded-xl border border-gray-100 text-sm font-medium text-gray-600 bg-gray-50 active:bg-green-50 transition-all">${opt}</button>`).join('')}
                    </div>
                    <div id="expl-box" class="hidden mt-6 p-5 bg-emerald-50 rounded-2xl border-l-4 border-emerald-500 shadow-inner">
                        <p class="text-xs text-emerald-800 leading-relaxed"><span class="font-bold block mb-1">💡 專家解析：</span>${item.i}</p>
                        <button onclick="window.nextQuest()" class="mt-5 w-full esun-bg-green text-white py-3 rounded-xl font-bold text-xs shadow-md">下一題</button>
                    </div>
                </div>`;
        };

        window.handleSelect = (idx) => {
            const correct = window.quizData[window.currentIdx].a;
            const btns = document.querySelectorAll('.quiz-btn');
            btns.forEach(b => b.disabled = true);
            if(idx == correct) { window.score++; btns[idx].classList.add('bg-green-100', 'text-green-700', 'border-green-300'); }
            else { btns[idx].classList.add('bg-red-50', 'text-red-700', 'border-red-200'); btns[correct].classList.add('bg-green-50', 'text-green-700'); }
            document.getElementById('expl-box').classList.remove('hidden');
        };

        window.nextQuest = () => {
            window.currentIdx++;
            if(window.currentIdx < window.quizData.length) window.renderQuestion();
            else { document.getElementById('quiz-container').classList.add('hidden'); document.getElementById('result-screen').classList.remove('hidden'); document.getElementById('result-msg').innerText = `本次答對 ${window.score} 題。卓越不凡！`; }
        };

        // --- 管理端邏輯 ---
        document.addEventListener('DOMContentLoaded', () => {
            const lBtn = document.getElementById('viewLearner'); 
            const aBtn = document.getElementById('viewAdmin');
            const aiGenBtn = document.getElementById('aiGenBtn');
            const publishBtn = document.getElementById('publishBtn');

            lBtn.onclick = () => { document.getElementById('learnerSection').classList.remove('hidden'); document.getElementById('adminSection').classList.add('hidden'); lBtn.className = "text-xs px-4 py-1.5 rounded-md font-bold transition-all bg-white esun-text-green shadow-sm"; aBtn.className = "text-xs px-4 py-1.5 rounded-md font-bold transition-all text-gray-400"; window.backToCategories(); };
            aBtn.onclick = () => { document.getElementById('learnerSection').classList.add('hidden'); document.getElementById('adminSection').classList.remove('hidden'); aBtn.className = "text-xs px-4 py-1.5 rounded-md font-bold transition-all bg-white esun-text-green shadow-sm"; lBtn.className = "text-xs px-4 py-1.5 rounded-md font-bold transition-all text-gray-400"; };

            aiGenBtn.onclick = async () => {
                const text = document.getElementById('rawText').value; if(!text) return window.showToast("請導入素材");
                const loader = document.getElementById('aiLoader'); loader.classList.remove('hidden');
                try {
                    const prompt = `你是一位銀行合規專家。請產出5題單選練習。格式：[{"q":"題目","o":["A","B","C","D"],"a":0,"i":"解析"}]。內容：\n${text}`;
                    const res = await fetch(getUrl("/aiProxy"), { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({prompt}) });
                    const result = await res.json();
                    const cleanJson = result.choices[0].message.content.replace(/```json/g, '').replace(/```/g, '').trim();
                    window.tempEditData = window.tempEditData.concat(JSON.parse(cleanJson));
                    renderEdit(); window.showToast("AI 解析成功");
                } catch(e) { window.showToast("❌ AI 解析失敗，請重試"); }
                loader.classList.add('hidden');
            };

            publishBtn.onclick = async () => {
                const title = document.getElementById('unitTitleInput').value; if(!title) return window.showToast("請輸入卷宗名稱");
                publishBtn.disabled = true;
                const ok = await fetch(getUrl("/saveExam"), { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ category: window.currentCategory, title, questions: window.tempEditData, timestamp: Date.now() }) });
                if(ok.ok) { window.showToast("✅ 已同步至雲端"); window.tempEditData = []; document.getElementById('unitTitleInput').value = ""; renderEdit(); }
                else { window.showToast("❌ 雲端同步失敗"); }
                publishBtn.disabled = false;
            };

            function renderEdit() {
                const area = document.getElementById('editArea');
                document.getElementById('qCountTop').innerText = window.tempEditData.length;
                if(window.tempEditData.length === 0) { area.innerHTML = ""; return; }
                area.innerHTML = window.tempEditData.map((d, i) => `
                    <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm relative">
                        <button onclick="window.tempEditData.splice(${i}, 1); document.dispatchEvent(new Event('renderEditEvent'));" class="absolute top-4 right-4 text-xs">🗑️</button>
                        <input type="text" value="${d.q}" oninput="window.tempEditData[${i}].q=this.value" class="w-full font-bold text-sm bg-transparent border-b border-gray-100 py-1 mb-4">
                        <div class="grid grid-cols-1 gap-2">${d.o.map((o, oi) => `<div class="flex items-center gap-2"><input type="radio" name="r_${i}" ${d.a==oi?'checked':''} onchange="window.tempEditData[${i}].a=${oi}"><input type="text" value="${o}" oninput="window.tempEditData[${i}].o[${oi}]=this.value" class="text-xs flex-1 bg-gray-50 p-2 rounded-lg"></div>`).join('')}</div>
                        <textarea oninput="window.tempEditData[${i}].i=this.value" class="w-full mt-4 bg-yellow-50 p-3 rounded-xl text-[10px] focus:outline-none" rows="2">${d.i}</textarea>
                    </div>`).join('');
            }
            document.addEventListener('renderEditEvent', renderEdit);
        });
    </script>
</body>
</html>
